<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лента — SmartSpend</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <style>
    /* Feed cards */
    .feed-list { display: flex; flex-direction: column; gap: 12px; }
    .feed-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 20px 22px; display: flex; gap: 16px; align-items: flex-start;
      transition: box-shadow 0.15s, border-color 0.15s; cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .feed-card:hover { box-shadow: var(--shadow-md); border-color: rgba(0,0,0,0.1); }
    body.dark .feed-card:hover { border-color: rgba(255,255,255,0.12); }
    .feed-card-cover {
      width: 72px; height: 72px; border-radius: var(--r-sm); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .feed-card-body { flex: 1; min-width: 0; }
    .feed-card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .feed-card-category { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; letter-spacing: 0.02em; }
    .feed-card-type { font-size: 11px; color: var(--text-3); }
    .feed-card-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 5px; line-height: 1.3; }
    .feed-card-excerpt { font-size: 13px; color: var(--text-2); line-height: 1.55; margin-bottom: 10px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .feed-card-footer { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .feed-card-author { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
    .feed-card-stat { font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
    .feed-card-stat svg { width: 12px; height: 12px; }
    .feed-card-date { font-size: 12px; color: var(--text-3); margin-left: auto; }

    /* Set card variant */
    .feed-card.set-card .feed-card-cover { font-size: 24px; }
    .set-budget { font-family: var(--mono); font-size: 13px; color: var(--accent-green); font-weight: 500; }
  </style>
</head>
<body>

<div class="app-layout" id="appLayout">
  <!-- sidebar injected by JS -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Лента</div>
        <div class="page-subtitle">Новые наборы и статьи от авторов</div>
      </div>
      <a href="create-article.html" class="btn btn-secondary" style="gap:6px">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 2v10M2 7h10"/></svg>
        Написать статью
      </a>
    </div>

    <div class="filter-bar">
      <div class="tab-group">
        <button class="tab-btn active" data-tab="all">Все</button>
        <button class="tab-btn" data-tab="set">Наборы</button>
        <button class="tab-btn" data-tab="article">Статьи</button>
      </div>
      <select class="filter-select" id="sortSelect">
        <option value="new">Сначала новые</option>
        <option value="popular">По популярности</option>
        <option value="comments">По комментариям</option>
      </select>
    </div>

    <div class="feed-list" id="feedList">
      <div style="text-align:center;padding:48px;color:var(--text-3)">
        <div class="spinner" style="margin:0 auto 12px"></div>
        Загружаем ленту…
      </div>
    </div>
  </main>
</div>

<script src="assets/js/theme.js"></script>
<script src="assets/js/sidebar-component.js"></script>
<script>
  // Auth check
  if (localStorage.getItem('smartspend_auth') !== 'true') location.href = 'index.html';

  // Init sidebar
  initSidebarPage('feed');
  Theme.init();

  // Category icons & emoji
  const categoryEmoji = {
    'Уход': '🧴', 'Спорт': '💪', 'Продукты': '☕', 'Здоровье': '💊',
    'Одежда': '👕', 'Техника': '💻', 'Финансы': '📊', 'Философия': '🧠',
    'Инвентарь': '📦', 'Потребление': '🛒', 'Психология': '🧘'
  };

  let allItems = [];
  let currentTab = 'all';

  // Load feed data
  fetch('data/feed.json')
    .then(r => r.json())
    .then(data => {
      allItems = data.items;
      renderFeed(allItems);
    })
    .catch(() => renderFeed(mockFeed()));

  function mockFeed() {
    return [
      { id: 'f1', type: 'article', articleId: 'a3', title: 'Smart-база: сколько стоит ваш месяц', excerpt: 'Smart-база — точная стоимость одного месяца вашей жизни без излишеств.', category: 'Финансы', categoryColor: '#8B6543', author: 'SmartSpend', authorInitials: 'SS', publishedAt: '2026-01-10', readTime: 10, likesCount: 487, commentsCount: 56, coverColor: '#F5EDE4' },
      { id: 'f2', type: 'set', setId: 's1', title: 'Базовый уход за телом', excerpt: 'Минимально необходимый набор средств гигиены и ухода. 6 позиций.', category: 'Уход', categoryColor: '#4E8268', author: 'SmartSpend', authorInitials: 'SS', publishedAt: '2026-01-15', itemsCount: 6, monthlyBudget: 1850 }
    ];
  }

  function renderFeed(items) {
    const list = document.getElementById('feedList');
    if (!items.length) {
      list.innerHTML = '<div class="empty-state"><h3>Пусто</h3><p>В этой категории пока нет публикаций</p></div>';
      return;
    }
    list.innerHTML = items.map(item => renderCard(item)).join('');
  }

  function renderCard(item) {
    const emoji = categoryEmoji[item.category] || '📌';
    const coverStyle = item.coverColor
      ? `background:${item.coverColor};`
      : `background:var(--accent-green-light);`;
    const categoryStyle = `background:${item.categoryColor}22;color:${item.categoryColor};border:1px solid ${item.categoryColor}44;`;
    const link = item.type === 'article' ? `article.html?id=${item.articleId}` : `set-detail.html?id=${item.setId}`;

    if (item.type === 'article') {
      return `
        <a class="feed-card" href="${link}">
          <div class="feed-card-cover" style="${coverStyle}">${emoji}</div>
          <div class="feed-card-body">
            <div class="feed-card-meta">
              <span class="feed-card-category" style="${categoryStyle}">${item.category}</span>
              <span class="feed-card-type">Статья · ${item.readTime} мин</span>
            </div>
            <div class="feed-card-title">${item.title}</div>
            <div class="feed-card-excerpt">${item.excerpt}</div>
            <div class="feed-card-footer">
              <div class="feed-card-author">
                <div class="avatar" style="width:20px;height:20px;font-size:9px">${item.authorInitials}</div>
                ${item.author}
              </div>
              <span class="feed-card-stat">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 6s2-4 5-4 5 4 5 4-2 4-5 4-5-4-5-4z"/><circle cx="6" cy="6" r="1.5"/></svg>
                ${item.likesCount}
              </span>
              <span class="feed-card-stat">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 2h10a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H4L1 12V3a1 1 0 0 1 0-1z"/></svg>
                ${item.commentsCount}
              </span>
              <span class="feed-card-date">${formatDate(item.publishedAt)}</span>
            </div>
          </div>
        </a>`;
    } else {
      return `
        <a class="feed-card set-card" href="${link}">
          <div class="feed-card-cover" style="background:${item.categoryColor}18;">${emoji}</div>
          <div class="feed-card-body">
            <div class="feed-card-meta">
              <span class="feed-card-category" style="${categoryStyle}">${item.category}</span>
              <span class="feed-card-type">Набор · ${item.itemsCount} позиций</span>
            </div>
            <div class="feed-card-title">${item.title}</div>
            <div class="feed-card-excerpt">${item.excerpt}</div>
            <div class="feed-card-footer">
              <div class="feed-card-author">
                <div class="avatar" style="width:20px;height:20px;font-size:9px">${item.authorInitials}</div>
                ${item.author}
              </div>
              <span class="set-budget">${item.monthlyBudget.toLocaleString('ru')} ₽/мес</span>
              ${item.inInventoryCount ? `<span class="feed-card-stat">${item.inInventoryCount.toLocaleString('ru')} добавили</span>` : ''}
              <span class="feed-card-date">${formatDate(item.publishedAt)}</span>
            </div>
          </div>
        </a>`;
    }
  }

  function formatDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString('ru', { day: 'numeric', month: 'short' });
  }

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      const filtered = currentTab === 'all' ? allItems : allItems.filter(i => i.type === currentTab);
      renderFeed(filtered);
    });
  });

  // Sort
  document.getElementById('sortSelect').addEventListener('change', function() {
    const tab = currentTab === 'all' ? allItems : allItems.filter(i => i.type === currentTab);
    const sorted = [...tab];
    if (this.value === 'popular') sorted.sort((a, b) => (b.likesCount || b.inInventoryCount || 0) - (a.likesCount || a.inInventoryCount || 0));
    else if (this.value === 'comments') sorted.sort((a, b) => (b.commentsCount || 0) - (a.commentsCount || 0));
    else sorted.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
    renderFeed(sorted);
  });
</script>
</body>
</html>
