<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог наборов — SmartSpend</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <style>
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .set-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
      transition: box-shadow 0.15s; cursor: pointer; text-decoration: none; color: inherit;
    }
    .set-card:hover { box-shadow: var(--shadow-md); }
    .set-card-header { display: flex; align-items: flex-start; gap: 12px; }
    .set-card-icon {
      width: 44px; height: 44px; border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .set-card-info { flex: 1; min-width: 0; }
    .set-card-category { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; display: inline-block; margin-bottom: 4px; }
    .set-card-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; }
    .set-card-desc { font-size: 13px; color: var(--text-2); line-height: 1.55; }
    .set-card-stats { display: flex; align-items: center; gap: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
    .set-stat { font-size: 12px; color: var(--text-3); }
    .set-stat strong { color: var(--text); font-family: var(--mono); font-weight: 500; }
    .set-card-budget { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--accent-green); margin-left: auto; }
    .set-card-footer { display: flex; gap: 8px; align-items: center; }
    .set-card-rating { font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 3px; }
    .set-card-users { font-size: 12px; color: var(--text-3); margin-left: auto; }
    .btn-add-inv {
      padding: 7px 14px; border-radius: var(--r-sm); font-size: 12px; font-weight: 500;
      background: var(--accent-green-light); color: var(--accent-green); border: 1px solid var(--accent-green-border);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-add-inv:hover { background: var(--accent-green); color: #fff; }
    .btn-add-inv.added { background: var(--accent-green); color: #fff; }

    /* Category filter chips */
    .cat-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .cat-chip {
      padding: 5px 14px; border-radius: 100px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: var(--surface); color: var(--text-2);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .cat-chip:hover { color: var(--text); border-color: rgba(0,0,0,0.15); }
    .cat-chip.active { background: var(--accent-green-light); color: var(--accent-green); border-color: var(--accent-green-border); }
  </style>
</head>
<body>

<div class="app-layout" id="appLayout">
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Каталог наборов</div>
        <div class="page-subtitle">Готовые наборы от команды SmartSpend и авторов</div>
      </div>
      <a href="create-set.html" class="btn btn-secondary">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 2v10M2 7h10"/></svg>
        Создать набор
      </a>
    </div>

    <div class="filter-bar">
      <input class="search-input" id="searchInput" type="text" placeholder="Поиск по названию…">
      <select class="filter-select" id="sortSelect">
        <option value="popular">По популярности</option>
        <option value="new">Сначала новые</option>
        <option value="rating">По рейтингу</option>
        <option value="price">По бюджету</option>
      </select>
    </div>

    <div class="cat-chips" id="catChips"></div>
    <div class="catalog-grid" id="catalogGrid">
      <div style="text-align:center;padding:48px;color:var(--text-3);grid-column:1/-1">
        <div class="spinner" style="margin:0 auto 12px"></div>
        Загружаем каталог…
      </div>
    </div>
  </main>
</div>

<script src="assets/js/theme.js"></script>
<script src="assets/js/sidebar-component.js"></script>
<script>
  if (localStorage.getItem('smartspend_auth') !== 'true') location.href = 'index.html';
  initSidebarPage('catalog');
  Theme.init();

  const categoryEmoji = {
    'Уход': '🧴', 'Спорт': '💪', 'Продукты': '☕', 'Здоровье': '💊',
    'Одежда': '👕', 'Техника': '💻'
  };

  let allSets = [];
  let activeCategory = 'Все';
  let searchQuery = '';
  const addedSets = new Set(JSON.parse(localStorage.getItem('added_sets') || '[]'));

  fetch('data/sets.json')
    .then(r => r.json())
    .then(data => {
      allSets = data.sets;
      renderCategories(data.sets);
      renderGrid(allSets);
    })
    .catch(() => {
      allSets = mockSets();
      renderCategories(allSets);
      renderGrid(allSets);
    });

  function mockSets() {
    return [
      { id: 's1', title: 'Базовый уход за телом', category: 'Уход', categoryColor: '#4E8268', description: 'Минимально необходимый набор средств гигиены и ухода. Рассчитан на один месяц.', itemsCount: 6, monthlyBudget: 1850, rating: 4.8, reviewsCount: 124, inInventoryCount: 892, author: 'SmartSpend', authorInitials: 'SS' },
      { id: 's2', title: 'Спортивное питание: старт', category: 'Спорт', categoryColor: '#5B7EA6', description: 'Базовый набор спортивного питания: протеин, витамины, омега-3.', itemsCount: 4, monthlyBudget: 3200, rating: 4.6, reviewsCount: 87, inInventoryCount: 456, author: 'Алексей Фитнес', authorInitials: 'АФ' },
      { id: 's4', title: 'Домашняя аптечка', category: 'Здоровье', categoryColor: '#C06060', description: 'Базовый набор лекарств и средств первой помощи.', itemsCount: 8, monthlyBudget: 800, rating: 4.7, reviewsCount: 198, inInventoryCount: 1240, author: 'SmartSpend', authorInitials: 'SS' }
    ];
  }

  function renderCategories(sets) {
    const cats = ['Все', ...new Set(sets.map(s => s.category))];
    const chipsEl = document.getElementById('catChips');
    chipsEl.innerHTML = cats.map(cat => `
      <button class="cat-chip${cat === activeCategory ? ' active' : ''}" data-cat="${cat}">${cat}</button>
    `).join('');
    chipsEl.querySelectorAll('.cat-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        chipsEl.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
      });
    });
  }

  function applyFilters() {
    let filtered = activeCategory === 'Все' ? [...allSets] : allSets.filter(s => s.category === activeCategory);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(s => s.title.toLowerCase().includes(q) || s.description.toLowerCase().includes(q));
    }
    const sort = document.getElementById('sortSelect').value;
    if (sort === 'popular') filtered.sort((a,b) => (b.inInventoryCount||0) - (a.inInventoryCount||0));
    else if (sort === 'rating') filtered.sort((a,b) => (b.rating||0) - (a.rating||0));
    else if (sort === 'price') filtered.sort((a,b) => a.monthlyBudget - b.monthlyBudget);
    renderGrid(filtered);
  }

  function renderGrid(sets) {
    const grid = document.getElementById('catalogGrid');
    if (!sets.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>Ничего не найдено</h3><p>Попробуйте изменить фильтры</p></div>';
      return;
    }
    grid.innerHTML = sets.map(s => renderSetCard(s)).join('');
    grid.querySelectorAll('.btn-add-inv').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const id = btn.dataset.id;
        if (addedSets.has(id)) {
          location.href = 'inventory.html';
          return;
        }
        addedSets.add(id);
        localStorage.setItem('added_sets', JSON.stringify([...addedSets]));
        btn.textContent = '✓ Добавлено';
        btn.classList.add('added');
        setTimeout(() => { btn.textContent = 'В инвентарь →'; }, 1500);
      });
    });
  }

  function renderSetCard(s) {
    const emoji = categoryEmoji[s.category] || '📦';
    const catStyle = `background:${s.categoryColor}18;color:${s.categoryColor};border:1px solid ${s.categoryColor}30;`;
    const iconStyle = `background:${s.categoryColor}14;`;
    const isAdded = addedSets.has(s.id);
    return `
      <a class="set-card" href="set-detail.html?id=${s.id}" style="text-decoration:none;color:inherit">
        <div class="set-card-header">
          <div class="set-card-icon" style="${iconStyle}">${emoji}</div>
          <div class="set-card-info">
            <span class="set-card-category" style="${catStyle}">${s.category}</span>
            <div class="set-card-title">${s.title}</div>
          </div>
        </div>
        <div class="set-card-desc">${s.description}</div>
        <div class="set-card-stats">
          <div class="set-stat"><strong>${s.itemsCount}</strong> поз.</div>
          <div class="set-stat"><strong>${s.inInventoryCount?.toLocaleString('ru') || '—'}</strong> добавили</div>
          <div class="set-card-budget">${s.monthlyBudget.toLocaleString('ru')} ₽/мес</div>
        </div>
        <div class="set-card-footer">
          <div class="set-card-rating">★ ${s.rating} (${s.reviewsCount})</div>
          <span class="set-card-users">от ${s.author}</span>
          <button class="btn-add-inv${isAdded ? ' added' : ''}" data-id="${s.id}">${isAdded ? '✓ Добавлено' : '+ В инвентарь'}</button>
        </div>
      </a>`;
  }

  // Search
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = this.value.trim();
      applyFilters();
    }, 300);
  });

  // Sort
  document.getElementById('sortSelect').addEventListener('change', applyFilters);
</script>
</body>
</html>
