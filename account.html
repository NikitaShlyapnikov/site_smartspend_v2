<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аккаунт — SmartSpend</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <style>
    .account-container { max-width: 640px; }
    .account-header { display: flex; align-items: center; gap: 16px; padding: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 20px; }
    .account-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--accent-green-light); border: 2px solid var(--accent-green-border); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; color: var(--accent-green); }
    .account-name { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .account-email { font-size: 13px; color: var(--text-2); margin-top: 2px; }
    .account-plan { margin-top: 6px; }

    .info-group { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 16px; overflow: hidden; }
    .info-group-title { font-size: 12px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
    .info-row { display: flex; align-items: center; padding: 13px 20px; border-bottom: 1px solid var(--border); gap: 16px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 13px; color: var(--text-2); flex: 1; }
    .info-value { font-size: 13px; font-weight: 500; font-family: var(--mono); }
    .info-value.plain { font-family: var(--sans); }

    .session-row { display: flex; align-items: center; padding: 13px 20px; border-bottom: 1px solid var(--border); gap: 12px; }
    .session-row:last-child { border-bottom: none; }
    .session-device { font-size: 13px; font-weight: 500; flex: 1; }
    .session-meta { font-size: 12px; color: var(--text-3); }
    .session-current { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 100px; background: var(--accent-green-light); color: var(--accent-green); border: 1px solid var(--accent-green-border); }
  </style>
</head>
<body>

<div class="app-layout" id="appLayout">
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Аккаунт</div>
        <div class="page-subtitle">Информация об аккаунте и безопасность</div>
      </div>
      <a href="settings.html" class="btn btn-secondary">Настройки</a>
    </div>

    <div class="account-container" id="accountContent">
      <div style="text-align:center;padding:48px;color:var(--text-3)">
        <div class="spinner" style="margin:0 auto 12px"></div>
      </div>
    </div>
  </main>
</div>

<script src="assets/js/theme.js"></script>
<script src="assets/js/sidebar-component.js"></script>
<script>
  initSidebarPage('profile');
  Theme.init();

  const username = localStorage.getItem('smartspend_username') || 'Никита Орлов';
  const initials = username.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const joinDate = new Date('2024-03-15').toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });

  document.getElementById('accountContent').innerHTML = `
    <div class="account-header">
      <div class="account-avatar">${initials}</div>
      <div>
        <div class="account-name">${username}</div>
        <div class="account-email">nikita@example.com</div>
        <div class="account-plan"><span class="badge badge-green">✦ Pro</span></div>
      </div>
    </div>

    <div class="info-group">
      <div class="info-group-title">Сведения об аккаунте</div>
      <div class="info-row">
        <span class="info-label">ID аккаунта</span>
        <span class="info-value">USR-20240315-001</span>
      </div>
      <div class="info-row">
        <span class="info-label">Дата регистрации</span>
        <span class="info-value plain">${joinDate}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Подписка</span>
        <span class="info-value plain">Pro · до 15 марта 2027</span>
      </div>
      <div class="info-row">
        <span class="info-label">Тип оплаты</span>
        <span class="info-value plain">Ежегодная</span>
      </div>
    </div>

    <div class="info-group">
      <div class="info-group-title">Безопасность</div>
      <div class="info-row">
        <span class="info-label">Пароль</span>
        <button class="btn btn-ghost" style="font-size:13px" onclick="showToast('В демо-версии изменение пароля недоступно')">Изменить</button>
      </div>
      <div class="info-row">
        <span class="info-label">Двухфакторная аутентификация</span>
        <span class="info-value plain" style="color:var(--text-3)">Не настроена</span>
      </div>
      <div class="info-row">
        <span class="info-label">Последний вход</span>
        <span class="info-value plain">${new Date().toLocaleDateString('ru', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>
      </div>
    </div>

    <div class="info-group">
      <div class="info-group-title">Активные сессии</div>
      <div class="session-row">
        <div style="font-size:20px">💻</div>
        <div style="flex:1">
          <div class="session-device">Windows / Chrome</div>
          <div class="session-meta">Москва · сейчас</div>
        </div>
        <span class="session-current">Текущая</span>
      </div>
      <div class="session-row">
        <div style="font-size:20px">📱</div>
        <div style="flex:1">
          <div class="session-device">iPhone / Safari</div>
          <div class="session-meta">Москва · вчера в 19:30</div>
        </div>
        <button class="btn btn-ghost" style="font-size:12px" onclick="showToast('Сессия завершена')">Завершить</button>
      </div>
    </div>

    <div class="info-group" style="border-color:var(--accent-red-border);background:var(--accent-red-light)">
      <div class="info-group-title" style="background:var(--accent-red-light);color:var(--accent-red);border-color:var(--accent-red-border)">Опасная зона</div>
      <div class="info-row" style="border-color:var(--accent-red-border)">
        <div>
          <div style="font-size:14px;font-weight:500;color:var(--accent-red)">Удалить аккаунт</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:2px">Все данные будут удалены без возможности восстановления</div>
        </div>
        <button class="btn btn-danger" onclick="confirmDelete()">Удалить</button>
      </div>
    </div>
  `;

  function confirmDelete() {
    if (confirm('Вы уверены? Это действие необратимо — все данные будут удалены.')) {
      localStorage.clear();
      location.href = 'index.html';
    }
  }

  function showToast(msg) {
    let t = document.querySelector('.toast');
    if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
