<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpend — Лента</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #EEEDE9;
    --surface: #FFFFFF;
    --surface-2: #F6F5F2;
    --surface-3: #EFEEE9;
    --border: rgba(0,0,0,0.07);
    --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.03);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --text: #1A1916;
    --text-2: #6B6860;
    --text-3: #AEACA5;
    --accent-green: #4E8268;
    --accent-green-light: #F2F7F4;
    --accent-green-border: #C8DDD3;
    --mono: 'Geist Mono', monospace;
    --sans: 'Geist', sans-serif;
    --r: 16px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 240px 1fr;
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--surface);
    display: flex; flex-direction: column;
    padding: 24px 0;
    position: sticky; top: 0; height: 100vh;
    box-shadow: 1px 0 0 var(--border);
  }
  .logo {
    font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
    padding: 4px 16px 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-text { flex: 1; white-space: nowrap; overflow: hidden; }
  .sidebar-toggle {
    background: none; border: none; cursor: pointer;
    color: var(--text-3); padding: 4px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s; flex-shrink: 0;
  }
  .sidebar-toggle:hover { color: var(--text); background: var(--surface-2); }
  .logo-mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--text); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 16px; height: 16px; }
  nav { padding: 8px 12px; flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px;
    font-size: 14px; font-weight: 400; color: var(--text-2);
    cursor: pointer; transition: all 0.15s; text-decoration: none;
    letter-spacing: -0.01em;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--surface-2); color: var(--text); font-weight: 500; }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.4; }
  .nav-item.active .nav-icon, .nav-item:hover .nav-icon { opacity: 0.8; }
  .nav-divider { height: 1px; background: var(--border); margin: 6px 12px; }
  .sidebar-bottom {
    padding: 12px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px; }
  .avatar-sm {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface-3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--text-2); flex-shrink: 0;
  }
  .sidebar-user-name { font-size: 13px; font-weight: 500; letter-spacing: -0.01em; }
  .sidebar-user-plan { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .theme-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px;
    font-size: 14px; color: var(--text-2);
    cursor: pointer; border: none; background: none;
    width: 100%; text-align: left; letter-spacing: -0.01em;
    transition: all 0.15s; font-family: var(--sans);
  }
  .theme-toggle:hover { background: var(--surface-2); color: var(--text); }
  .theme-label { white-space: nowrap; overflow: hidden; }

  /* ── COLLAPSED ── */
  body.sidebar-collapsed { grid-template-columns: 56px 1fr; }
  body.sidebar-collapsed .logo-text,
  body.sidebar-collapsed .nav-label,
  body.sidebar-collapsed .nav-label-block,
  body.sidebar-collapsed .theme-label { display: none; }
  body.sidebar-collapsed .logo-mark { display: none; }
  body.sidebar-collapsed aside { padding: 20px 0; }
  body.sidebar-collapsed .logo { padding: 4px 12px 20px; justify-content: center; }
  body.sidebar-collapsed nav { padding: 4px 8px; }
  body.sidebar-collapsed .nav-item { justify-content: center; padding: 10px; }
  body.sidebar-collapsed .nav-icon { opacity: 0.5; width: 18px; height: 18px; }
  body.sidebar-collapsed .nav-item.active .nav-icon,
  body.sidebar-collapsed .nav-item:hover .nav-icon { opacity: 0.9; }
  body.sidebar-collapsed .sidebar-bottom { padding: 10px 8px; align-items: center; }
  body.sidebar-collapsed .theme-toggle { justify-content: center; padding: 10px; }
  body.sidebar-collapsed .nav-divider { margin: 6px 8px; }
  body.sidebar-collapsed .sidebar-user { justify-content: center; padding: 8px 0; }

  /* ── DARK MODE ── */
  body.dark {
    --bg: #141412;
    --surface: #1E1D1B;
    --surface-2: #252422;
    --surface-3: #2C2B28;
    --border: rgba(255,255,255,0.07);
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --text: #F0EEE8;
    --text-2: #9A9890;
    --text-3: #5A5854;
    --accent-green-light: #1A2820;
    --accent-green-border: #2A4035;
  }
  body.dark .logo-mark { background: var(--surface-3); }
  body.dark .source-badge.ss { background: #1A2820; color: #7AAF96; }
  body.dark .tab-btn.active { background: var(--surface-3); border-color: var(--border); color: var(--text); }
  body.dark .cat-pill.active { background: var(--text); border-color: var(--text); color: var(--bg); }
  body.dark .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
  body.dark .card.read { background: var(--surface-2); }
  body.dark .sort-select { background: var(--surface-2); border-color: var(--border); color: var(--text); }
  body.dark .liked-btn.liked { color: #E87070; }
  body.dark .liked-btn.liked svg { fill: #E87070; stroke: #E87070; opacity: 1; }

  /* ── MAIN ── */
  main {
    padding: 0;
    display: flex; flex-direction: column;
    min-width: 0; max-width: 840px;
    height: 100vh; overflow: hidden;
  }

  /* ── PAGE HEADER (sticky) ── */
  .page-header {
    padding: 32px 36px 0;
    flex-shrink: 0;
  }

  /* ── FILTERS (sticky) ── */
  .filters-sticky {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 16px 36px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  body.dark .filters-sticky { background: var(--bg); }

  /* ── FEED SCROLL AREA ── */
  .feed-scroll {
    flex: 1; overflow-y: auto;
    padding: 20px 36px 40px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .feed-scroll::-webkit-scrollbar { width: 6px; }
  .feed-scroll::-webkit-scrollbar-track { background: transparent; }
  .feed-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .feed-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
  .page-subtitle { font-size: 14px; color: var(--text-2); letter-spacing: -0.01em; margin-top: 4px; margin-bottom: 20px; }

  /* ── FILTERS ── */
  .filters-block { display: flex; flex-direction: column; gap: 8px; }

  .filters-row1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filters-row2 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  .filters-spacer { flex: 1; min-width: 8px; }

  /* Row 1: type segmented tabs */
  .tab-group {
    display: flex; background: var(--surface); border-radius: 10px;
    padding: 3px; gap: 2px;
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .tab-btn {
    padding: 5px 13px; border-radius: 7px;
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    color: var(--text-3); cursor: pointer; border: none;
    background: transparent; transition: all 0.12s;
    white-space: nowrap; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 5px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }

  /* Row 2: mode pills */
  .mode-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    color: var(--text-2); cursor: pointer; white-space: nowrap;
    transition: all 0.12s; box-shadow: var(--shadow-sm);
    letter-spacing: -0.01em;
  }
  .mode-pill:hover { background: var(--surface-2); color: var(--text); }
  .mode-pill.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .mode-pill svg { flex-shrink: 0; }

  .sort-wrap { display: flex; align-items: center; gap: 6px; position: relative; }
  .sort-label-txt { font-size: 12px; color: var(--text-3); letter-spacing: -0.01em; white-space: nowrap; }

  /* Custom dropdown trigger */
  .sort-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    color: var(--text-2); cursor: pointer; letter-spacing: -0.01em;
    box-shadow: var(--shadow-sm); outline: none; transition: border-color 0.12s, background 0.12s;
    white-space: nowrap; user-select: none;
  }
  .sort-btn:hover { background: var(--surface-2); color: var(--text); }
  .sort-btn.open { border-color: var(--accent-green-border); color: var(--text); }
  .sort-btn-chevron { opacity: 0.45; transition: transform 0.15s; flex-shrink: 0; }
  .sort-btn.open .sort-btn-chevron { transform: rotate(180deg); }

  /* Dropdown panel */
  .sort-dropdown {
    display: none; position: absolute; top: calc(100% + 5px); right: 0; z-index: 100;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden; min-width: 220px;
  }
  .sort-dropdown.open { display: block; }

  .sort-group-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-3); padding: 10px 14px 6px;
  }
  .sort-divider { height: 1px; background: var(--border); margin: 4px 0; }
  .sort-option {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; font-size: 13px; font-weight: 400;
    color: var(--text-2); cursor: pointer; transition: background 0.1s;
    letter-spacing: -0.01em; gap: 24px;
  }
  .sort-option:hover { background: var(--surface-2); color: var(--text); }
  .sort-option.active { color: var(--text); font-weight: 500; }
  .sort-option-check {
    width: 16px; height: 16px; flex-shrink: 0; color: var(--accent-green); opacity: 0;
  }
  .sort-option.active .sort-option-check { opacity: 1; }
  body.dark .sort-dropdown { box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3); }

  /* Category pills */
  .cats-scroll {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
  }
  .cat-pill {
    padding: 5px 13px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    color: var(--text-2); cursor: pointer; white-space: nowrap;
    transition: all 0.12s; box-shadow: var(--shadow-sm);
    letter-spacing: -0.01em;
  }
  .cat-pill:hover { background: var(--surface-2); color: var(--text); }
  .cat-pill.active { background: var(--text); color: var(--surface); border-color: var(--text); }

  /* ── FEED ── */
  .feed-list { display: flex; flex-direction: column; gap: 10px; }

  /* ── CARD BASE ── */
  .card {
    background: var(--surface); border-radius: var(--r);
    box-shadow: var(--shadow); overflow: hidden;
    cursor: pointer; transition: box-shadow 0.15s, transform 0.15s;
    position: relative;
  }
  .card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.05);
    transform: translateY(-1px);
  }
  /* Read state: slightly dimmed */
  .card.read { opacity: 0.55; }
  .card.read:hover { opacity: 1; }

  /* ── CARD TYPE ICON (shared) ── */
  .card-type-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--surface-2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-type-icon svg { opacity: 0.5; }

  /* ── SET CARD ── */
  .set-accent { height: 3px; }
  .set-body { padding: 16px 18px 14px; display: flex; flex-direction: column; gap: 10px; }
  .set-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .set-left { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .set-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

  .source-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 5px; white-space: nowrap;
  }
  .source-badge.ss { background: var(--accent-green-light); color: #4E8268; }
  .new-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 5px;
    background: var(--accent-green-light); color: var(--accent-green);
    border: 1px solid var(--accent-green-border);
  }
  .base-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
    padding: 2px 7px; border-radius: 5px; white-space: nowrap;
    background: var(--accent-green-light); color: #4E8268;
    border: 1px solid var(--accent-green-border);
  }
  .extra-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
    padding: 2px 7px; border-radius: 5px; white-space: nowrap;
    background: var(--surface-2); color: var(--text-3);
    border: 1px solid var(--border);
  }
  .cat-badge {
    font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 5px;
    background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border);
  }

  .set-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
  .set-desc { font-size: 12px; color: var(--text-2); line-height: 1.45; }

  .set-amount-block { text-align: right; flex-shrink: 0; }
  .set-amount { font-family: var(--mono); font-size: 17px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
  .set-amount-label { font-size: 10px; color: var(--text-3); margin-top: 2px; }

  .set-items { display: flex; flex-wrap: wrap; gap: 4px; }
  .set-item-tag {
    font-size: 11px; color: var(--text-3);
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 7px; white-space: nowrap;
  }
  .set-item-more { font-size: 11px; color: var(--text-3); padding: 2px 4px; }

  .set-footer {
    border-top: 1px solid var(--border); padding: 10px 18px;
    display: flex; align-items: center; gap: 12px;
  }
  .meta-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-3); font-family: var(--mono);
  }
  .meta-item svg { opacity: 0.4; flex-shrink: 0; }
  .meta-time { font-size: 11px; color: var(--text-3); font-family: var(--mono); }

  /* ── ARTICLE CARD ── */
  .article-body { padding: 16px 18px 14px; display: flex; flex-direction: column; gap: 10px; }

  .article-header { display: flex; flex-direction: column; gap: 6px; }

  .article-header-top {
    display: flex; align-items: center; gap: 8px;
  }
  .author-avatar-sm {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .author-name-inline { font-size: 12px; color: var(--text-2); font-weight: 500; letter-spacing: -0.01em; flex: 1; }
  .article-time-chip { font-size: 11px; color: var(--text-3); font-family: var(--mono); flex-shrink: 0; }

  .article-title {
    font-size: 15px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.3;
  }

  .article-preview {
    font-size: 13px; color: var(--text-2); line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    word-break: break-word; overflow-wrap: anywhere;
  }

  .article-footer {
    border-top: 1px solid var(--border); padding: 10px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .f-spacer { flex: 1; }
  .a-stat {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-3); font-family: var(--mono);
  }
  .a-stat svg { opacity: 0.4; flex-shrink: 0; }
  .set-link { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-3); letter-spacing: -0.01em; }
  .set-link-label { color: var(--text-3); }
  .set-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Liked button */
  .liked-btn {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-3); font-family: var(--mono);
    background: none; border: none; cursor: pointer; padding: 0;
    transition: color 0.12s;
  }
  .liked-btn svg { opacity: 0.35; transition: opacity 0.12s, fill 0.12s, stroke 0.12s; }
  .liked-btn:hover { color: #E87070; }
  .liked-btn:hover svg { opacity: 0.6; }
  .liked-btn.liked { color: #E87070; }
  .liked-btn.liked svg { opacity: 1; fill: #E87070; stroke: #E87070; }

  /* ── FILTER SUMMARY ── */
  .filter-summary {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-3); letter-spacing: -0.01em;
    padding: 0 2px;
  }
  .filter-summary-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .filter-tag {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px;
    font-size: 11px; font-weight: 500; color: var(--text-2);
  }
  .filter-tag-active {
    background: var(--surface-3); border-color: var(--border);
    color: var(--text);
  }
  .filter-count {
    margin-left: auto; font-family: var(--mono);
    font-size: 11px; color: var(--text-3);
  }
  .reset-btn {
    background: none; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    color: var(--text-3); padding: 2px 6px; border-radius: 5px;
    letter-spacing: -0.01em; transition: color 0.12s, background 0.12s;
    white-space: nowrap; flex-shrink: 0;
  }
  .reset-btn:hover { color: var(--text); background: var(--surface-2); }

  /* ── EMPTY ── */
  .empty-state { padding: 52px 24px; text-align: center; }
  .empty-icon { font-size: 26px; margin-bottom: 12px; opacity: 0.45; }
  .empty-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 5px; }
  .empty-desc { font-size: 13px; color: var(--text-3); line-height: 1.5; }
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside id="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="5" height="5" rx="1.5" fill="white" opacity="0.9"/>
        <rect x="9" y="2" width="5" height="5" rx="1.5" fill="white" opacity="0.5"/>
        <rect x="2" y="9" width="5" height="5" rx="1.5" fill="white" opacity="0.5"/>
        <rect x="9" y="9" width="5" height="5" rx="1.5" fill="white" opacity="0.9"/>
      </svg>
    </div>
    <span class="logo-text">SmartSpend</span>
    <button class="sidebar-toggle" id="sidebarToggle">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>
      </svg>
    </button>
  </div>

      </div>
      <div class="f-spacer"></div>
      ${item.setName ? `<div class="set-link"><div class="set-dot" style="background:${item.setColor}"></div><span class="set-link-label">Набор:</span>${item.setName}</div>` : ''}
    </div>
  </div>`;
}

/* ─────────────────────────────
   STATE & RENDER
───────────────────────────── */

let activeTab  = 'all';   // all | sets | articles
let activeMode = null;    // null | unread | subscriptions | liked
let activeCat  = 'all';
let activeSort = 'popular_7d';

function markRead(id) {
  readSet.add(id);
  document.querySelectorAll(`.card[data-id="${id}"]`).forEach(c => c.classList.add('read'));
  if (activeMode === 'unread') renderFeed();
}

function toggleLike(e, id) {
  e.stopPropagation();
  const item = FEED.find(f => f.id === id);
  if (!item) return;
  const wasLiked = liked.has(id);
  wasLiked ? liked.delete(id) : liked.add(id);

  const btn = e.currentTarget;
  btn.classList.toggle('liked', !wasLiked);
  btn.querySelector('.lc').textContent = item.likes + (liked.has(id) ? 1 : 0);

  if (activeMode === 'liked') renderFeed();
}

function getItems() {
  let list = FEED.filter(item => {
    // Mode filters (override type filter)
    if (activeMode === 'liked')         return item.type === 'article' && liked.has(item.id);
    if (activeMode === 'subscriptions') { const a = item.authorId ? AUTHORS[item.authorId] : null; return a && a.following; }
    if (activeMode === 'my-sets')       return item.type === 'article' && item.setName && MY_SETS.has(item.setName);
    if (activeMode === 'unread'        && readSet.has(item.id)) return false;

    // Type filter
    if (activeTab === 'sets'     && item.type !== 'set')     return false;
    if (activeTab === 'articles' && item.type !== 'article') return false;

    // Category
    if (activeCat !== 'all' && item.cat !== activeCat) return false;

    return true;
  });

  if (activeSort === 'newest') list.sort((a,b) => b.ts - a.ts);
  else list.sort((a,b) => b.pop - a.pop);

  return list;
}

function resetFilters() {
  activeTab  = 'all';
  activeMode = null;
  activeCat  = 'all';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'all'));
  document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.toggle('active', p.dataset.cat === 'all'));
  document.getElementById('catScroll').style.display = '';
  renderFeed();
}

function renderFeed() {
  const list = getItems();
  const el   = document.getElementById('feedList');

  // Build active filter summary
  const tags = [];
  const tabLabels = { all: 'Все', sets: 'Наборы', articles: 'Статьи' };
  if (activeTab !== 'all') tags.push(tabLabels[activeTab]);
  if (activeCat !== 'all') {
    const pill = document.querySelector(`.cat-pill[data-cat="${activeCat}"]`);
    if (pill) tags.push(pill.textContent.trim());
  }
  const modeLabels = { unread: 'Непрочитанное', subscriptions: 'Подписки', liked: 'Понравившиеся', 'my-sets': 'Мои наборы' };
  if (activeMode) tags.push(modeLabels[activeMode]);

  const summaryEl = document.getElementById('filterSummary');
  const tagsEl    = document.getElementById('filterTags');
  const countEl   = document.getElementById('filterCount');
  const resetEl   = document.getElementById('resetBtn');
  const hasFilters = tags.length > 0;

  // Always show summary when filters are active — even if 0 results
  summaryEl.style.display = hasFilters ? '' : 'none';
  tagsEl.innerHTML = tags.map(t => `<span class="filter-tag filter-tag-active">${t}</span>`).join('');
  countEl.textContent = `${list.length} ${list.length === 1 ? 'результат' : list.length < 5 ? 'результата' : 'результатов'}`;
  resetEl.style.display = hasFilters ? '' : 'none';

  if (!list.length) {
    const msgs = {
      liked:         ['❤️', 'Нет понравившихся статей', 'Нажимайте ❤ на статьи, которые хотите сохранить'],
      unread:        ['✅', 'Всё прочитано', 'Вы просмотрели все материалы в ленте'],
      subscriptions: ['👥', 'Нет контента от подписок', 'Подпишитесь на авторов, чтобы видеть их публикации здесь'],
      'my-sets':     ['📦', 'Нет статей по вашим наборам', 'Авторы пока не публиковали статьи, связанные с вашими наборами'],
    };
    const key = activeMode || 'default';
    const [icon, title, desc] = msgs[key] || ['📭', 'Ничего не найдено', 'Попробуйте изменить фильтры'];
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${icon}</div>
      <div class="empty-title">${title}</div>
      <div class="empty-desc">${desc}</div>
    </div>`;
    return;
  }

  el.innerHTML = list.map(item =>
    item.type === 'set' ? buildSet(item) : buildArticle(item)
  ).join('');
}

/* ─────────────────────────────
   EVENTS
───────────────────────────── */

// Type tabs
document.getElementById('tabGroup').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTab = btn.dataset.tab;
  // Clear active mode when switching type tab
  activeMode = null;
  document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
  renderFeed();
});

// Category pills
document.getElementById('catScroll').addEventListener('click', e => {
  const pill = e.target.closest('.cat-pill');
  if (!pill) return;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeCat = pill.dataset.cat;
  renderFeed();
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', resetFilters);

// Mode pills — categories stay visible for unread (valid combo), hide only for liked/subscriptions/my-sets
document.getElementById('modeRow').addEventListener('click', e => {
  const pill = e.target.closest('.mode-pill');
  if (!pill) return;
  const mode = pill.dataset.mode;
  if (activeMode === mode) {
    activeMode = null;
    pill.classList.remove('active');
  } else {
    activeMode = mode;
    document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
  }
  renderFeed();
});

// Custom sort dropdown
const sortBtn      = document.getElementById('sortBtn');
const sortDropdown = document.getElementById('sortDropdown');
const sortBtnLabel = document.getElementById('sortBtnLabel');

sortBtn.addEventListener('click', e => {
  e.stopPropagation();
  sortBtn.classList.toggle('open');
  sortDropdown.classList.toggle('open');
});

sortDropdown.addEventListener('click', e => {
  const opt = e.target.closest('.sort-option');
  if (!opt) return;
  document.querySelectorAll('.sort-option').forEach(o => o.classList.remove('active'));
  opt.classList.add('active');
  activeSort = opt.dataset.sort;
  sortBtnLabel.textContent = opt.dataset.label;
  sortBtn.classList.remove('open');
  sortDropdown.classList.remove('open');
  renderFeed();
});

document.addEventListener('click', () => {
  sortBtn.classList.remove('open');
  sortDropdown.classList.remove('open');
});

document.getElementById('sidebarToggle').addEventListener('click', () =>
  document.body.classList.toggle('sidebar-collapsed')
);

document.getElementById('themeToggle').addEventListener('click', () => {
  const dark = document.body.classList.toggle('dark');
  document.querySelector('.theme-icon-light').style.display = dark ? 'none' : '';
  document.querySelector('.theme-icon-dark').style.display  = dark ? '' : 'none';
  document.querySelector('.theme-label').textContent = dark ? 'Светлая тема' : 'Тёмная тема';
});

/* ─────────────────────────────
   INIT
───────────────────────────── */
renderFeed();
</script>
</body>
</html>
