<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpend — Каталог наборов</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #EEEDE9;
    --surface: #FFFFFF;
    --surface-2: #F6F5F2;
    --surface-3: #EFEEE9;
    --border: rgba(0,0,0,0.07);
    --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.03);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --text: #1A1916;
    --text-2: #6B6860;
    --text-3: #AEACA5;
    --accent-green-light: #F2F7F4;
    --accent-green-border: #C8DDD3;
    --mono: 'Geist Mono', monospace;
    --sans: 'Geist', sans-serif;
    --r: 16px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 240px 1fr;
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--surface);
    display: flex; flex-direction: column;
    padding: 24px 0;
    position: sticky; top: 0; height: 100vh;
    box-shadow: 1px 0 0 var(--border);
  }
  .logo {
    font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
    padding: 4px 16px 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-text { flex: 1; white-space: nowrap; overflow: hidden; }
  .sidebar-toggle {
    background: none; border: none; cursor: pointer;
    color: var(--text-3); padding: 4px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s; flex-shrink: 0;
  }
  .sidebar-toggle:hover { color: var(--text); background: var(--surface-2); }
  .logo-mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--text); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 16px; height: 16px; }
  nav { padding: 8px 12px; flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px;
    font-size: 14px; font-weight: 400; color: var(--text-2);
    cursor: pointer; transition: all 0.15s; text-decoration: none;
    letter-spacing: -0.01em;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--surface-2); color: var(--text); font-weight: 500; }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.4; }
  .nav-item.active .nav-icon, .nav-item:hover .nav-icon { opacity: 0.8; }
  .nav-divider { height: 1px; background: var(--border); margin: 6px 12px; }
  .sidebar-bottom {
    padding: 12px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px; }
  .avatar-sm {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface-3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--text-2); flex-shrink: 0;
  }
  .sidebar-user-name { font-size: 13px; font-weight: 500; letter-spacing: -0.01em; }
  .sidebar-user-plan { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .theme-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px;
    font-size: 14px; color: var(--text-2);
    cursor: pointer; border: none; background: none;
    width: 100%; text-align: left; letter-spacing: -0.01em;
    transition: all 0.15s; font-family: var(--sans);
  }
  .theme-toggle:hover { background: var(--surface-2); color: var(--text); }
  .theme-label { white-space: nowrap; overflow: hidden; }

  /* ── COLLAPSED ── */
  body.sidebar-collapsed { grid-template-columns: 56px 1fr; }
  body.sidebar-collapsed .logo-text,
  body.sidebar-collapsed .nav-label,
  body.sidebar-collapsed .nav-label-block,
  body.sidebar-collapsed .theme-label { display: none; }
  body.sidebar-collapsed .logo-mark { display: none; }
  body.sidebar-collapsed aside { padding: 20px 0; }
  body.sidebar-collapsed .logo { padding: 4px 12px 20px; justify-content: center; }
  body.sidebar-collapsed nav { padding: 4px 8px; }
  body.sidebar-collapsed .nav-item { justify-content: center; padding: 10px; }
  body.sidebar-collapsed .nav-icon { opacity: 0.5; width: 18px; height: 18px; }
  body.sidebar-collapsed .nav-item.active .nav-icon,
  body.sidebar-collapsed .nav-item:hover .nav-icon { opacity: 0.9; }
  body.sidebar-collapsed .sidebar-bottom { padding: 10px 8px; align-items: center; }
  body.sidebar-collapsed .theme-toggle { justify-content: center; padding: 10px; }
  body.sidebar-collapsed .nav-divider { margin: 6px 8px; }
  body.sidebar-collapsed .sidebar-user { justify-content: center; padding: 8px 0; }

  /* ── DARK MODE ── */
  body.dark {
    --bg: #141412;
    --surface: #1E1D1B;
    --surface-2: #252422;
    --surface-3: #2C2B28;
    --border: rgba(255,255,255,0.07);
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --text: #F0EEE8;
    --text-2: #9A9890;
    --text-3: #5A5854;
    --accent-green-light: #1A2820;
    --accent-green-border: #2A4035;
  }
  body.dark .logo-mark { background: var(--surface-3); }
  body.dark .logo-mark rect { fill: #9A9890; }
  body.dark .btn-create { background: var(--surface-3); color: var(--text); }
  body.dark .cat-btn.active { background: var(--surface-3); border-color: var(--border); }
  body.dark .cat-btn.active .cat-count { color: rgba(240,238,232,0.35); }
  body.dark .seg-btn.active { background: var(--surface-3); border-color: var(--border); color: var(--text); }
  body.dark .source-badge.ss { background: #1A2820; color: #7AAF96; }
  body.dark .source-badge.community { background: #1E1A2C; color: #9A88C8; }
  body.dark .source-badge.own { background: var(--surface-3); color: var(--text-3); }
  body.dark .base-badge { background: #1A2820; color: #7AAF96; border-color: #2A4035; }
  body.dark .extra-badge { background: var(--surface-3); border-color: var(--border); }
  body.dark .catalog-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.35); }

  /* ── MAIN ── */
  main {
    padding: 32px 36px;
    display: flex; flex-direction: column; gap: 28px;
    min-width: 0;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
  .page-subtitle { font-size: 14px; color: var(--text-2); letter-spacing: -0.01em; margin-top: 4px; }
  .btn-create {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 16px; border-radius: 10px;
    background: var(--text); color: var(--surface);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    letter-spacing: -0.01em; cursor: pointer; border: none;
    transition: opacity 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-create:hover { opacity: 0.85; }

  /* ── FILTERS ── */
  .filters-block { display: flex; flex-direction: column; gap: 8px; }

  /* Строка 1: категории */
  .cats-scroll {
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto; padding-bottom: 2px;
  }
  .cats-scroll::-webkit-scrollbar { display: none; }
  .cat-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 13px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    color: var(--text-2); cursor: pointer; white-space: nowrap;
    transition: all 0.12s; box-shadow: var(--shadow-sm);
    letter-spacing: -0.01em;
  }
  .cat-btn:hover { background: var(--surface-2); color: var(--text); }
  .cat-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .cat-count { font-size: 10px; font-family: var(--mono); color: var(--text-3); }
  .cat-btn.active .cat-count { color: rgba(255,255,255,0.45); }

  /* Строка 2: тип + источник + сортировка + счётчик */
  .filters-row2 {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .seg-ctrl {
    display: flex; background: var(--surface); border-radius: 10px;
    padding: 3px; gap: 2px;
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .seg-btn {
    padding: 5px 12px; border-radius: 7px;
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    color: var(--text-3); cursor: pointer; border: none;
    background: transparent; transition: all 0.12s;
    white-space: nowrap; letter-spacing: -0.01em;
  }
  .seg-btn:hover { color: var(--text); }
  .seg-btn.active {
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border);
  }
  .filters-spacer { flex: 1; min-width: 8px; }
  .sort-label { font-size: 12px; color: var(--text-3); white-space: nowrap; letter-spacing: -0.01em; }
  .results-count { font-size: 12px; color: var(--text-3); font-family: var(--mono); white-space: nowrap; }

  /* ── CATALOG GRID ── */
  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  /* ── CATALOG CARD ── */
  .catalog-card {
    background: var(--surface); border-radius: var(--r);
    box-shadow: var(--shadow); overflow: hidden;
    cursor: pointer; transition: box-shadow 0.15s, transform 0.15s;
    display: flex; flex-direction: column;
  }
  .catalog-card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.05);
    transform: translateY(-1px);
  }
  .card-accent-bar { height: 3px; flex-shrink: 0; }
  .card-body { padding: 16px 18px 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

  .card-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .source-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 5px; white-space: nowrap;
  }
  .source-badge.ss { background: var(--accent-green-light); color: #4E8268; }
  .source-badge.community { background: #F0ECFF; color: #6B52C0; }
  .source-badge.own { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }
  .base-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
    padding: 2px 7px; border-radius: 5px; white-space: nowrap;
    background: var(--accent-green-light); color: #4E8268;
    border: 1px solid var(--accent-green-border);
  }
  .extra-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
    padding: 2px 7px; border-radius: 5px; white-space: nowrap;
    background: var(--surface-2); color: var(--text-3);
    border: 1px solid var(--border);
  }

  .card-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
  .card-desc { font-size: 12px; color: var(--text-2); line-height: 1.45; margin-top: 2px; }

  .card-items { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .card-item-tag {
    font-size: 11px; color: var(--text-3);
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 7px; white-space: nowrap;
  }
  .card-item-more { font-size: 11px; color: var(--text-3); padding: 2px 4px; }

  .card-footer {
    border-top: 1px solid var(--border); padding: 11px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .card-amount-left { display: flex; flex-direction: column; gap: 1px; }
  .card-amount {
    font-family: var(--mono); font-size: 16px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1;
  }
  .card-amount-label { font-size: 10px; color: var(--text-3); margin-top: 2px; }

  .card-meta-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .users-count {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-3); font-family: var(--mono);
  }
  .users-count svg { opacity: 0.4; }
  .private-label {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-3); font-family: var(--mono);
  }
  .private-label svg { opacity: 0.35; }
  .card-date { font-size: 10px; color: var(--text-3); font-family: var(--mono); }
  .articles-count {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-3); font-family: var(--mono);
  }
  .articles-count svg { opacity: 0.35; flex-shrink: 0; }

  /* ── EMPTY STATE ── */
  .empty-state { grid-column: 1/-1; padding: 56px 24px; text-align: center; }
  .empty-state-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
  .empty-state-desc { font-size: 13px; color: var(--text-3); line-height: 1.5; }

  /* ── MY SETS HINT ── */
  .my-sets-hint {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; background: var(--surface);
    border-radius: var(--r); box-shadow: var(--shadow);
    border: 1.5px dashed var(--border);
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .my-sets-hint:hover { border-color: #8DBFA8; background: var(--accent-green-light); }
  .my-sets-hint-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--surface-2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--text-3); transition: all 0.15s;
  }
  .my-sets-hint:hover .my-sets-hint-icon { background: var(--accent-green-border); color: #4E8268; }
  .my-sets-hint-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .my-sets-hint-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }

  @media (max-width: 1100px) {
    .catalog-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<aside id="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="5" height="5" rx="1.5" fill="white" opacity="0.9"/>

  <div class="sidebar-bottom">
    <button class="theme-toggle" id="themeToggle">
      <svg class="theme-icon-light" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>

</aside>

<main>

  <div class="page-header">
    <div>
      <div class="page-title">Каталог наборов</div>
      <div class="page-subtitle">Готовые наборы товаров для конвертов — от SmartSpend и сообщества</div>
    </div>
    <button class="btn-create">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Создать набор
    </button>
  </div>

  <div class="filters-block">

    <!-- Строка 1: категории -->
    <div class="cats-scroll" id="catScroll">
      <button class="cat-btn active" data-cat="all">Все <span class="cat-count">14</span></button>
      <button class="cat-btn" data-cat="food">Питание <span class="cat-count">4</span></button>
      <button class="cat-btn" data-cat="clothes">Одежда <span class="cat-count">3</span></button>
      <button class="cat-btn" data-cat="home">Дом <span class="cat-count">2</span></button>
      <button class="cat-btn" data-cat="health">Здоровье <span class="cat-count">2</span></button>
      <button class="cat-btn" data-cat="transport">Транспорт <span class="cat-count">1</span></button>
      <button class="cat-btn" data-cat="leisure">Досуг <span class="cat-count">1</span></button>
      <button class="cat-btn" data-cat="gifts">Подарки <span class="cat-count">1</span></button>
    </div>

    <!-- Строка 2 -->
    <div class="filters-row2">
      <div class="seg-ctrl" id="typeTabs">
        <button class="seg-btn active" data-type="all">Все</button>
        <button class="seg-btn" data-type="base">Основа</button>
        <button class="seg-btn" data-type="extra">Дополнение</button>
      </div>
      <div class="seg-ctrl" id="sourceTabs">
        <button class="seg-btn active" data-source="all">Все источники</button>
        <button class="seg-btn" data-source="ss">SmartSpend</button>
        <button class="seg-btn" data-source="community">Сообщество</button>
        <button class="seg-btn" data-source="own">Мои</button>
      </div>
      <div class="filters-spacer"></div>
      <span class="sort-label">Сортировка:</span>
      <div class="seg-ctrl" id="sortTabs">
        <button class="seg-btn active" data-sort="popular">По популярности</button>
        <button class="seg-btn" data-sort="newest">Сначала новые</button>
      </div>
      <div class="results-count" id="resultsCount">14 наборов</div>
    </div>

  </div>

  <div class="catalog-grid" id="catalogGrid"></div>

</main>

<script>
const SETS = [
  { id:1,  source:'ss',        cat:'food',      base:true,  color:'#7DAF92', title:'Базовое питание',       desc:'Полноценный рацион на месяц: крупы, овощи, белок, молочка, масло',     items:['Крупы','Овощи и фрукты','Мясо и рыба','Молочные продукты'], more:4, amount:12000, users:14200, added:'2024-01-15', articles:18 },
  { id:2,  source:'ss',        cat:'food',      base:false, color:'#C4A882', title:'Вкусняшки и снеки',      desc:'Сладкое, кофе, соки, снеки — всё что балует, но не обязательно',      items:['Шоколад и конфеты','Кофе и чай','Соки и напитки'],          more:2, amount:3500,  users:8700,  added:'2024-02-10', articles:4  },
  { id:3,  source:'ss',        cat:'food',      base:false, color:'#9AB8A8', title:'Правильное питание',     desc:'Фитнес-ориентированный рацион с упором на белок и нутриенты',          items:['Протеин','Куриная грудка','Греческий йогурт','Овсянка'],     more:3, amount:16500, users:4100,  added:'2024-03-22', articles:11 },
  { id:4,  source:'ss',        cat:'clothes',   base:true,  color:'#8A9EB8', title:'Базовый гардероб',       desc:'Капсульный гардероб на год — то без чего невозможно обойтись',        items:['Футболки (5 шт)','Джинсы (2 шт)','Кроссовки','Куртка'],     more:6, amount:5800,  users:9300,  added:'2024-01-20', articles:9  },
  { id:5,  source:'community', cat:'clothes',   base:false, color:'#B89AAE', title:'Офисный гардероб',       desc:'Деловой стиль: рубашки, брюки, туфли, пиджак',                         items:['Рубашки (3 шт)','Классические брюки','Туфли','Пиджак'],     more:3, amount:7200,  users:2800,  added:'2024-06-05', articles:3  },
  { id:6,  source:'community', cat:'clothes',   base:false, color:'#A8A89A', title:'Спортивная одежда',      desc:'Для тренировок и активного отдыха: зал, бег, велопрогулки',            items:['Лосины / шорты','Спортивные футболки','Кроссовки беговые'],  more:2, amount:4100,  users:5200,  added:'2024-05-18', articles:0  },
  { id:7,  source:'ss',        cat:'home',      base:true,  color:'#B8A87A', title:'Бытовая химия',          desc:'Стирка, уборка, посуда — всё что нужно для чистоты дома',             items:['Стиральный порошок','Средство для посуды','Чистящие'],       more:4, amount:2200,  users:11500, added:'2024-01-15', articles:6  },
  { id:8,  source:'ss',        cat:'home',      base:false, color:'#C4B496', title:'Уют дома',               desc:'Свечи, текстиль, декор — небольшие покупки для уюта',                  items:['Свечи','Пледы и подушки','Комнатные растения'],             more:2, amount:3800,  users:3400,  added:'2024-04-11', articles:5  },
  { id:9,  source:'ss',        cat:'health',    base:true,  color:'#96B8A0', title:'Базовая аптечка',        desc:'Ежемесячные расходы на здоровье: витамины и средства гигиены',         items:['Витамины','Средства гигиены','Обезболивающие','Пластыри'],   more:3, amount:2800,  users:7800,  added:'2024-01-15', articles:7  },
  { id:10, source:'community', cat:'health',    base:false, color:'#A0B4C8', title:'Уход за кожей',          desc:'Базовый корейский уход: очищение, тонер, крем, SPF',                   items:['Пенка для умывания','Тонер','Увлажняющий крем','Санскрин'],  more:2, amount:4500,  users:5600,  added:'2024-07-30', articles:12 },
  { id:11, source:'ss',        cat:'transport', base:true,  color:'#9696B8', title:'Общественный транспорт', desc:'Ежемесячный проездной + такси на крайний случай',                      items:['Проездной ЕТК','Такси (резерв)'],                            more:0, amount:3200,  users:8100,  added:'2024-01-20', articles:2  },
  { id:12, source:'ss',        cat:'gifts',     base:false, color:'#C8A08A', title:'Подарки близким',        desc:'Откладываем весь год — тратим на дни рождения и праздники',           items:['День рождения (×4)','НГ и праздники','Спонтанные подарки'], more:0, amount:2500,  users:6200,  added:'2024-02-28', articles:8  },
  { id:13, source:'community', cat:'leisure',   base:false, color:'#A8B4A0', title:'Подписки и стриминг',    desc:'Все цифровые подписки в одном конверте: музыка, кино, сервисы',        items:['Яндекс Плюс','Netflix','Spotify','iCloud / GDrive'],         more:2, amount:1800,  users:9100,  added:'2024-08-14', articles:0  },
  { id:14, source:'own',       cat:'food',      base:false, color:'#B8A8B8', title:'Мой рацион',             desc:'Персонализированный набор под мои предпочтения и диету',              items:['Гречка','Куриное филе','Творог','Яйца'],                     more:5, amount:9400,  users:null,  added:'2025-01-03', articles:0  },
];

let activeCat = 'all', activeSource = 'all', activeType = 'all', activeSort = 'popular';

const srcLabel = s => ({ ss:{cls:'ss',text:'SmartSpend'}, community:{cls:'community',text:'Сообщество'}, own:{cls:'own',text:'Мой набор'} }[s]);
const fmtUsers = n => n >= 10000 ? Math.round(n/1000)+'k' : n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
const fmtAmt   = n => n.toLocaleString('ru-RU') + ' ₽';
const fmtDate  = iso => new Date(iso).toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
const plural   = (n, f) => { const m=n%10, c=n%100; return (m===1&&c!==11)?f[0]:(m>=2&&m<=4&&(c<10||c>=20))?f[1]:f[2]; };

function renderCards() {
  let list = SETS.filter(s => {
    if (activeCat !== 'all' && s.cat !== activeCat) return false;
    if (activeSource !== 'all' && s.source !== activeSource) return false;
    if (activeType === 'base' && !s.base) return false;
    if (activeType === 'extra' && s.base) return false;
    return true;
  });
  list = [...list].sort(activeSort === 'newest'
    ? (a,b) => new Date(b.added) - new Date(a.added)
    : (a,b) => (b.users||0) - (a.users||0));

  const n = list.length;
  document.getElementById('resultsCount').textContent = n + ' ' + plural(n, ['набор','набора','наборов']);
  const grid = document.getElementById('catalogGrid');

  if (!n) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-title">Наборов не найдено</div><div class="empty-state-desc">Попробуйте изменить фильтры или создайте свой набор</div></div>`;
    return;
  }

  grid.innerHTML = list.map(s => {
    const src = srcLabel(s.source);
    const typeBadge = s.base ? '<span class="base-badge">Основа</span>' : '<span class="extra-badge">Дополнение</span>';
    const itemsHtml = s.items.map(i=>`<span class="card-item-tag">${i}</span>`).join('') + (s.more>0?`<span class="card-item-more">+${s.more}</span>`:'');
    const metaRight = s.users !== null
      ? `<div class="users-count"><svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>${fmtUsers(s.users)}</div><div class="card-date">${fmtDate(s.added)}</div>`
      : `<div class="private-label"><svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Приватный</div><div class="card-date">${fmtDate(s.added)}</div>`;

    return `<div class="catalog-card">
      <div class="card-accent-bar" style="background:${s.color}"></div>
      <div class="card-body">
        <div class="card-badges"><span class="source-badge ${src.cls}">${src.text}</span>${typeBadge}</div>
        <div><div class="card-title">${s.title}</div><div class="card-desc">${s.desc}</div></div>
        <div class="card-items">${itemsHtml}</div>
      </div>
      <div class="card-footer">
        <div class="card-amount-left"><div class="card-amount">${fmtAmt(s.amount)}</div><div class="card-amount-label">в месяц</div></div>
        <div class="card-meta-right">${metaRight}</div>
      </div>
    </div>`;
  }).join('');

  if (activeSource === 'own') {
    grid.innerHTML += `<div class="my-sets-hint"><div class="my-sets-hint-icon"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div><div><div class="my-sets-hint-title">Создать свой набор</div><div class="my-sets-hint-desc">Подберите товары под свои нужды и добавьте в конверт</div></div></div>`;
  }
}

// Events
document.getElementById('catScroll').addEventListener('click', e => {
  const b = e.target.closest('.cat-btn'); if (!b) return;
  document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); activeCat = b.dataset.cat; renderCards();
});
document.getElementById('typeTabs').addEventListener('click', e => {
  const b = e.target.closest('.seg-btn'); if (!b) return;
  document.querySelectorAll('#typeTabs .seg-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); activeType = b.dataset.type; renderCards();
});
document.getElementById('sourceTabs').addEventListener('click', e => {
  const b = e.target.closest('.seg-btn'); if (!b) return;
  document.querySelectorAll('#sourceTabs .seg-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); activeSource = b.dataset.source; renderCards();
});
document.getElementById('sortTabs').addEventListener('click', e => {
  const b = e.target.closest('.seg-btn'); if (!b) return;
  document.querySelectorAll('#sortTabs .seg-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); activeSort = b.dataset.sort; renderCards();
});
document.getElementById('sidebarToggle').addEventListener('click', () => document.body.classList.toggle('sidebar-collapsed'));
document.getElementById('themeToggle').addEventListener('click', () => {
  const d = document.body.classList.toggle('dark');
  document.querySelector('.theme-icon-light').style.display = d?'none':'';
  document.querySelector('.theme-icon-dark').style.display = d?'':'none';
  document.querySelector('.theme-label').textContent = d?'Светлая тема':'Тёмная тема';
});

renderCards();
</script>
</body>
</html>
