<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Набор — SmartSpend</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <style>
    .set-detail { max-width: 760px; }
    .set-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
    .set-header-icon { width: 60px; height: 60px; border-radius: var(--r); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .set-header-info { flex: 1; }
    .set-header-category { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 100px; display: inline-flex; align-items: center; gap: 5px; margin-bottom: 6px; }
    .set-header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 4px; }
    .set-header-meta { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .set-header-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    .set-desc { font-size: 14px; color: var(--text-2); line-height: 1.65; margin-bottom: 28px; padding: 18px 20px; background: var(--surface-2); border-radius: var(--r-sm); border: 1px solid var(--border); }

    /* Items table */
    .items-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
    .items-table th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .items-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    .items-table tr:last-child td { border-bottom: none; }
    .items-table tr:hover td { background: var(--surface-2); }
    .item-name-cell { font-weight: 500; }
    .item-type-badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 100px; }
    .item-type-consumable { background: var(--accent-green-light); color: var(--accent-green); border: 1px solid var(--accent-green-border); }
    .item-type-wear { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); }
    .item-price { font-family: var(--mono); font-weight: 500; }
    .btn-add-item { font-size: 11px; padding: 5px 10px; border-radius: 7px; background: var(--accent-green-light); color: var(--accent-green); border: 1px solid var(--accent-green-border); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .btn-add-item:hover { background: var(--accent-green); color: #fff; }
    .btn-add-item.added { background: var(--accent-green); color: #fff; }

    /* Stats row */
    .set-stats { display: flex; gap: 24px; padding: 16px 20px; background: var(--surface-2); border-radius: var(--r-sm); border: 1px solid var(--border); margin-bottom: 28px; flex-wrap: wrap; }
    .set-stat { text-align: center; }
    .set-stat-value { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--text); }
    .set-stat-label { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* Section title */
    .section-title { font-size: 14px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Related articles */
    .related-article { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); text-decoration: none; color: inherit; transition: all 0.15s; margin-bottom: 8px; }
    .related-article:hover { background: var(--surface-2); border-color: var(--accent-green-border); }
    .related-article-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .related-article-title { font-size: 13px; font-weight: 500; }
    .related-article-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-2); text-decoration: none; margin-bottom: 20px; transition: color 0.15s; }
    .back-link:hover { color: var(--text); }
    .back-link svg { width: 14px; height: 14px; }
  </style>
</head>
<body>

<div class="app-layout" id="appLayout">
  <main class="main-content">
    <a href="catalog.html" class="back-link">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
      Назад в каталог
    </a>
    <div class="set-detail" id="setDetail">
      <div style="text-align:center;padding:48px;color:var(--text-3)">
        <div class="spinner" style="margin:0 auto 12px"></div>
        Загружаем набор…
      </div>
    </div>
  </main>
</div>

<script src="assets/js/theme.js"></script>
<script src="assets/js/sidebar-component.js"></script>
<script>
  if (localStorage.getItem('smartspend_auth') !== 'true') location.href = 'index.html';
  initSidebarPage('catalog');
  Theme.init();

  const params = new URLSearchParams(location.search);
  const setId = params.get('id') || 's1';
  const addedSets = new Set(JSON.parse(localStorage.getItem('added_sets') || '[]'));

  const categoryEmoji = { 'Уход': '🧴', 'Спорт': '💪', 'Продукты': '☕', 'Здоровье': '💊', 'Одежда': '👕', 'Техника': '💻' };

  fetch('data/sets.json')
    .then(r => r.json())
    .then(data => {
      const set = data.sets.find(s => s.id === setId) || data.sets[0];
      renderSet(set);
    })
    .catch(() => renderSet(mockSet()));

  function mockSet() {
    return {
      id: 's1', title: 'Базовый уход за телом', category: 'Уход', categoryColor: '#4E8268',
      description: 'Минимально необходимый набор средств гигиены и ухода за телом. Рассчитан на один месяц для одного человека.',
      fullDescription: 'Этот набор включает всё необходимое для ежедневного ухода. Подобраны оптимальные объёмы и бренды с лучшим соотношением цена/качество.',
      author: 'Команда SmartSpend', authorInitials: 'SS', rating: 4.8, reviewsCount: 124, inInventoryCount: 892, itemsCount: 6, monthlyBudget: 1850,
      items: [
        { id: 'si1', name: 'Шампунь Head&Shoulders', type: 'consumable', dailyUse: 15, unit: 'мл', price: 380 },
        { id: 'si2', name: 'Гель для душа Dove', type: 'consumable', dailyUse: 20, unit: 'мл', price: 290 },
        { id: 'si3', name: 'Зубная паста Splat', type: 'consumable', dailyUse: 5, unit: 'мл', price: 240 }
      ],
      relatedArticles: ['a1', 'a3']
    };
  }

  function renderSet(s) {
    const emoji = categoryEmoji[s.category] || '📦';
    const catStyle = `background:${s.categoryColor}18;color:${s.categoryColor};border:1px solid ${s.categoryColor}30;`;
    const isAdded = addedSets.has(s.id);

    const itemsRows = (s.items || []).map(item => {
      const typeLabel = item.type === 'consumable' ? 'Расходное' : 'Ноское';
      const spec = item.type === 'consumable'
        ? `${item.dailyUse} ${item.unit}/день`
        : `${item.months} мес`;
      return `
        <tr>
          <td class="item-name-cell">${item.name}</td>
          <td><span class="item-type-badge item-type-${item.type}">${typeLabel}</span></td>
          <td>${spec}</td>
          <td><span class="item-price">${item.price?.toLocaleString('ru')} ₽</span></td>
          <td><button class="btn-add-item" data-item-id="${item.id}" data-set-id="${s.id}">+ Добавить</button></td>
        </tr>`;
    }).join('');

    document.getElementById('setDetail').innerHTML = `
      <div class="set-header">
        <div class="set-header-icon" style="background:${s.categoryColor}14">${emoji}</div>
        <div class="set-header-info">
          <span class="set-header-category" style="${catStyle}">${s.category}</span>
          <div class="set-header-title">${s.title}</div>
          <div class="set-header-meta">
            <span>★ ${s.rating} (${s.reviewsCount} отзывов)</span>
            <span>·</span>
            <span>${s.inInventoryCount?.toLocaleString('ru')} добавили</span>
            <span>·</span>
            <span>от ${s.author}</span>
          </div>
          <div class="set-header-actions">
            <button class="btn btn-green${isAdded ? '' : ''}" id="addAllBtn" onclick="addAllToInventory('${s.id}')">
              ${isAdded ? '✓ Уже в инвентаре' : '+ Добавить весь набор'}
            </button>
            <a href="inventory.html" class="btn btn-secondary">Мой инвентарь</a>
          </div>
        </div>
      </div>

      <div class="set-stats">
        <div class="set-stat">
          <div class="set-stat-value">${s.itemsCount}</div>
          <div class="set-stat-label">позиций</div>
        </div>
        <div class="set-stat">
          <div class="set-stat-value" style="color:var(--accent-green)">${s.monthlyBudget?.toLocaleString('ru')} ₽</div>
          <div class="set-stat-label">в месяц</div>
        </div>
        <div class="set-stat">
          <div class="set-stat-value">${s.inInventoryCount?.toLocaleString('ru')}</div>
          <div class="set-stat-label">пользователей</div>
        </div>
        <div class="set-stat">
          <div class="set-stat-value">★ ${s.rating}</div>
          <div class="set-stat-label">рейтинг</div>
        </div>
      </div>

      <div class="set-desc">${s.fullDescription || s.description}</div>

      <div class="section-title">Состав набора</div>
      <table class="items-table">
        <thead>
          <tr>
            <th>Позиция</th>
            <th>Тип</th>
            <th>Параметр</th>
            <th>Цена</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${itemsRows}</tbody>
      </table>

      ${s.relatedArticles?.length ? `
        <div class="section-title">Связанные статьи</div>
        <div id="relatedArticles"></div>
      ` : ''}
    `;

    // Add item handlers
    document.querySelectorAll('.btn-add-item').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.textContent = '✓ Добавлено';
        btn.classList.add('added');
        showToast('Добавлено в инвентарь');
      });
    });

    // Load related articles
    if (s.relatedArticles?.length) {
      fetch('data/articles.json')
        .then(r => r.json())
        .then(data => {
          const related = data.articles.filter(a => s.relatedArticles.includes(a.id));
          const el = document.getElementById('relatedArticles');
          if (el) el.innerHTML = related.map(a => `
            <a class="related-article" href="article.html?id=${a.id}">
              <div class="related-article-icon" style="background:${a.coverColor || '#F2F7F4'}">${a.category === 'Финансы' ? '📊' : a.category === 'Философия' ? '🧠' : '📖'}</div>
              <div>
                <div class="related-article-title">${a.title}</div>
                <div class="related-article-meta">${a.category} · ${a.readTime} мин чтения</div>
              </div>
            </a>
          `).join('');
        }).catch(() => {});
    }
  }

  function addAllToInventory(id) {
    addedSets.add(id);
    localStorage.setItem('added_sets', JSON.stringify([...addedSets]));
    document.getElementById('addAllBtn').textContent = '✓ Уже в инвентаре';
    showToast('Набор добавлен в инвентарь ✓');
  }

  function showToast(msg) {
    let t = document.querySelector('.toast');
    if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
