<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Инвентарь — SmartSpend</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <style>
    /* Inventory list */
    .inv-list { display: flex; flex-direction: column; gap: 8px; }

    .inv-item {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      overflow: hidden; transition: box-shadow 0.15s;
    }
    .inv-item:hover { box-shadow: var(--shadow); }
    .inv-item-main {
      display: grid; grid-template-columns: 4px 1fr auto;
      align-items: center; gap: 0;
      cursor: pointer;
    }
    .inv-status-bar { height: 100%; min-height: 56px; border-radius: 4px 0 0 4px; }
    .inv-status-bar.ok { background: var(--status-ok); }
    .inv-status-bar.soon { background: var(--status-soon); }
    .inv-status-bar.urgent { background: var(--status-urgent); }
    .inv-status-bar.over { background: var(--status-over); }

    .inv-item-body { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .inv-item-icon { font-size: 22px; flex-shrink: 0; }
    .inv-item-info { flex: 1; min-width: 0; }
    .inv-item-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 3px; }
    .inv-item-sub { font-size: 12px; color: var(--text-2); }
    .inv-item-right { text-align: right; padding: 14px 16px 14px 0; }
    .inv-days { font-family: var(--mono); font-size: 18px; font-weight: 500; line-height: 1; }
    .inv-days-label { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .inv-days.ok { color: var(--status-ok); }
    .inv-days.soon { color: var(--status-soon); }
    .inv-days.urgent { color: var(--status-urgent); }
    .inv-days.over { color: var(--status-over); }

    /* Expand */
    .inv-expand { display: none; padding: 0 16px 16px 32px; border-top: 1px solid var(--border); margin-top: 0; }
    .inv-item.open .inv-expand { display: block; }
    .inv-expand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 14px; }
    .inv-expand-stat { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px; }
    .inv-expand-label { font-size: 11px; color: var(--text-3); margin-bottom: 3px; }
    .inv-expand-value { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text); }
    .inv-history { margin-top: 14px; }
    .inv-history-title { font-size: 12px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .inv-history-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .inv-history-row:last-child { border-bottom: none; }
    .inv-history-date { color: var(--text-3); font-family: var(--mono); font-size: 12px; }
    .inv-history-price { margin-left: auto; font-family: var(--mono); font-weight: 500; }
    .inv-item-actions { display: flex; gap: 8px; margin-top: 12px; }

    /* Summary cards */
    .inv-summary { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .inv-sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 14px 16px; }
    .inv-sum-label { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
    .inv-sum-value { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--text); }
    .inv-sum-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  </style>
</head>
<body>

<div class="app-layout" id="appLayout">
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Инвентарь</div>
        <div class="page-subtitle">Следите за остатками и сроками</div>
      </div>
      <a href="catalog.html" class="btn btn-secondary">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 2v10M2 7h10"/></svg>
        Добавить из каталога
      </a>
    </div>

    <!-- Summary -->
    <div class="inv-summary" id="invSummary"></div>

    <!-- Filters -->
    <div class="filter-bar">
      <div class="tab-group">
        <button class="tab-btn active" data-tab="all">Все</button>
        <button class="tab-btn" data-tab="urgent">Срочно</button>
        <button class="tab-btn" data-tab="soon">Скоро</button>
        <button class="tab-btn" data-tab="ok">Хватает</button>
      </div>
      <select class="filter-select" id="catFilter">
        <option value="">Все категории</option>
      </select>
    </div>

    <div class="inv-list" id="invList">
      <div style="text-align:center;padding:48px;color:var(--text-3)">
        <div class="spinner" style="margin:0 auto 12px"></div>
        Загружаем инвентарь…
      </div>
    </div>
  </main>
</div>

<script src="assets/js/theme.js"></script>
<script src="assets/js/sidebar-component.js"></script>
<script>
  if (localStorage.getItem('smartspend_auth') !== 'true') location.href = 'index.html';
  initSidebarPage('inventory');
  Theme.init();

  const itemEmoji = { 'Спорт и питание': '💪', 'Уход': '🧴', 'Одежда': '👕', 'Техника': '💻', 'Гигиена': '🪥', 'Здоровье': '💊', 'Продукты': '☕' };

  let allItems = [];
  let activeTab = 'all';
  let activeCat = '';

  // Load inventory (inline mock — no fetch needed for file:// protocol)
  allItems = mockItems();
  renderCategories([...new Set(allItems.map(i => i.category))]);
  renderSummary(allItems);
  renderList(allItems);

  function mockItems() {
    return [
      { id: 'i1', name: 'Протеин Whey', category: 'Спорт и питание', type: 'consumable', quantity: 200, unit: 'г', dailyUse: 100, daysLeft: 2, status: 'urgent', price: 2800, buyDate: '2026-02-01', history: [{ date: '2026-02-01', qty: 1000, price: 2800 }] },
      { id: 'i2', name: 'Шампунь Head&Shoulders', category: 'Уход', type: 'consumable', quantity: 120, unit: 'мл', dailyUse: 15, daysLeft: 8, status: 'soon', price: 380, buyDate: '2026-02-10', history: [{ date: '2026-02-10', qty: 400, price: 380 }] },
      { id: 'i3', name: 'Зубная паста Splat', category: 'Уход', type: 'consumable', quantity: 30, unit: 'мл', dailyUse: 5, daysLeft: 6, status: 'soon', price: 240, buyDate: '2026-02-05', history: [{ date: '2026-02-05', qty: 100, price: 240 }] },
      { id: 'i4', name: 'Омега-3', category: 'Спорт и питание', type: 'consumable', quantity: 60, unit: 'шт', dailyUse: 2, daysLeft: 30, status: 'ok', price: 890, buyDate: '2026-01-20', history: [{ date: '2026-01-20', qty: 120, price: 890 }] },
      { id: 'i5', name: 'Витамин D3', category: 'Здоровье', type: 'consumable', quantity: 90, unit: 'шт', dailyUse: 1, daysLeft: 90, status: 'ok', price: 450, buyDate: '2026-01-01', history: [{ date: '2026-01-01', qty: 90, price: 450 }] },
      { id: 'i6', name: 'Гель для душа Dove', category: 'Уход', type: 'consumable', quantity: 200, unit: 'мл', dailyUse: 20, daysLeft: 10, status: 'soon', price: 290, buyDate: '2026-02-15', history: [{ date: '2026-02-15', qty: 400, price: 290 }] },
      { id: 'i7', name: 'Кроссовки Nike', category: 'Одежда', type: 'wear', daysLeft: 42, monthsLeft: 5, totalMonths: 18, status: 'ok', price: 8900, buyDate: '2025-10-15', history: [{ date: '2025-10-15', qty: 1, price: 8900 }] },
      { id: 'i8', name: 'Зонт', category: 'Разное', type: 'wear', daysLeft: 200, monthsLeft: 18, totalMonths: 24, status: 'ok', price: 1200, buyDate: '2025-06-01', history: [{ date: '2025-06-01', qty: 1, price: 1200 }] }
    ];
  }

  function renderCategories(cats) {
    const sel = document.getElementById('catFilter');
    cats.filter(c => c !== 'Все').forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', function() { activeCat = this.value; applyFilters(); });
  }

  function renderSummary(items) {
    const urgent = items.filter(i => i.status === 'urgent').length;
    const soon = items.filter(i => i.status === 'soon').length;
    const totalValue = items.reduce((s, i) => s + (i.price || 0), 0);
    document.getElementById('invSummary').innerHTML = `
      <div class="inv-sum-card">
        <div class="inv-sum-label">Всего позиций</div>
        <div class="inv-sum-value">${items.length}</div>
        <div class="inv-sum-sub">в инвентаре</div>
      </div>
      <div class="inv-sum-card" style="border-color:var(--status-urgent-border)">
        <div class="inv-sum-label">Срочно купить</div>
        <div class="inv-sum-value" style="color:var(--status-urgent)">${urgent}</div>
        <div class="inv-sum-sub">позиц${urgent === 1 ? 'ия' : 'ий'}</div>
      </div>
      <div class="inv-sum-card" style="border-color:var(--status-soon-border)">
        <div class="inv-sum-label">Скоро закончится</div>
        <div class="inv-sum-value" style="color:var(--status-soon)">${soon}</div>
        <div class="inv-sum-sub">позиц${soon === 1 ? 'ия' : 'ий'}</div>
      </div>
      <div class="inv-sum-card">
        <div class="inv-sum-label">Стоимость запасов</div>
        <div class="inv-sum-value">${totalValue.toLocaleString('ru')} ₽</div>
        <div class="inv-sum-sub">остаточная</div>
      </div>
    `;
  }

  function applyFilters() {
    let filtered = [...allItems];
    if (activeTab !== 'all') filtered = filtered.filter(i => i.status === activeTab);
    if (activeCat) filtered = filtered.filter(i => i.category === activeCat);
    renderList(filtered);
  }

  function renderList(items) {
    const list = document.getElementById('invList');
    // Sort: urgent first, then soon, then ok
    const order = { urgent: 0, soon: 1, ok: 2, over: 3 };
    const sorted = [...items].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));
    if (!sorted.length) {
      list.innerHTML = '<div class="empty-state"><h3>Ничего не найдено</h3><p>Попробуйте изменить фильтры или <a href="catalog.html" style="color:var(--accent-green)">добавить из каталога</a></p></div>';
      return;
    }
    list.innerHTML = sorted.map(item => renderItem(item)).join('');
    list.querySelectorAll('.inv-item-main').forEach(row => {
      row.addEventListener('click', () => {
        row.closest('.inv-item').classList.toggle('open');
      });
    });
  }

  function renderItem(item) {
    const emoji = itemEmoji[item.category] || '📦';
    const daysLabel = item.type === 'wear' ? `${item.monthsLeft || 0} мес` : `${item.daysLeft} дн`;
    const subText = item.type === 'consumable'
      ? `${item.quantity} ${item.unit} · ${item.dailyUse} ${item.unit}/день`
      : `Срок носки: ${item.monthsLeft}/${item.totalMonths} мес`;

    const historyHTML = (item.history || []).slice(-3).reverse().map(h => `
      <div class="inv-history-row">
        <span class="inv-history-date">${new Date(h.date).toLocaleDateString('ru', { day: 'numeric', month: 'short', year: '2-digit' })}</span>
        <span>${h.qty} ${item.unit || 'шт'}</span>
        <span class="inv-history-price">${h.price?.toLocaleString('ru')} ₽</span>
      </div>
    `).join('');

    const nextBuy = item.nextBuy ? new Date(item.nextBuy).toLocaleDateString('ru', { day: 'numeric', month: 'long' }) : '—';

    return `
      <div class="inv-item" data-id="${item.id}">
        <div class="inv-item-main">
          <div class="inv-status-bar ${item.status}"></div>
          <div class="inv-item-body">
            <div class="inv-item-icon">${emoji}</div>
            <div class="inv-item-info">
              <div class="inv-item-name">${item.name}</div>
              <div class="inv-item-sub">${subText}</div>
            </div>
          </div>
          <div class="inv-item-right">
            <div class="inv-days ${item.status}">${daysLabel}</div>
            <div class="inv-days-label">${item.type === 'wear' ? 'осталось' : 'осталось'}</div>
          </div>
        </div>
        <div class="inv-expand">
          <div class="inv-expand-grid">
            <div class="inv-expand-stat">
              <div class="inv-expand-label">Следующая покупка</div>
              <div class="inv-expand-value">${nextBuy}</div>
            </div>
            <div class="inv-expand-stat">
              <div class="inv-expand-label">Цена последняя</div>
              <div class="inv-expand-value">${item.price?.toLocaleString('ru')} ₽</div>
            </div>
            <div class="inv-expand-stat">
              <div class="inv-expand-label">Категория</div>
              <div class="inv-expand-value" style="font-family:var(--sans);font-size:13px">${item.category}</div>
            </div>
            ${item.type === 'consumable' ? `<div class="inv-expand-stat">
              <div class="inv-expand-label">Месячный расход</div>
              <div class="inv-expand-value">${Math.round(item.dailyUse * 30)} ${item.unit}</div>
            </div>` : ''}
          </div>
          ${item.history?.length ? `
            <div class="inv-history">
              <div class="inv-history-title">История покупок</div>
              ${historyHTML}
            </div>
          ` : ''}
          <div class="inv-item-actions">
            <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="markBought(event, '${item.id}')">✓ Купил(а)</button>
            <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px" onclick="removeItem(event, '${item.id}')">Удалить</button>
          </div>
        </div>
      </div>
    `;
  }

  function markBought(e, id) {
    e.stopPropagation();
    const item = allItems.find(i => i.id === id);
    if (!item) return;
    // Reset days
    if (item.type === 'consumable') {
      item.daysLeft = Math.round((item.quantity / item.dailyUse) * 3);
      item.status = item.daysLeft > 14 ? 'ok' : item.daysLeft > 7 ? 'soon' : 'urgent';
    }
    renderSummary(allItems);
    applyFilters();
    showToast('Покупка отмечена ✓');
  }

  function removeItem(e, id) {
    e.stopPropagation();
    allItems = allItems.filter(i => i.id !== id);
    renderSummary(allItems);
    applyFilters();
    showToast('Позиция удалена');
  }

  function showToast(msg) {
    let t = document.querySelector('.toast');
    if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      applyFilters();
    });
  });
</script>
</body>
</html>
