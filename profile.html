<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — SmartSpend</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <style>
    .profile-header {
      display: flex; align-items: flex-start; gap: 20px; margin-bottom: 28px;
      padding: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
    }
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--accent-green-light); border: 2px solid var(--accent-green-border); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 600; color: var(--accent-green); flex-shrink: 0; }
    .profile-info { flex: 1; }
    .profile-name { font-size: 20px; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 4px; }
    .profile-meta { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .profile-plan { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px; background: var(--accent-green-light); color: var(--accent-green); border: 1px solid var(--accent-green-border); }
    .profile-actions { display: flex; gap: 8px; }

    /* Capital card */
    .capital-card {
      background: var(--text); color: var(--bg); border-radius: var(--r);
      padding: 24px 28px; margin-bottom: 20px; display: grid;
      grid-template-columns: 1fr 1fr 1fr; gap: 20px;
    }
    body.dark .capital-card { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .capital-main-label { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .capital-main-value { font-family: var(--mono); font-size: 32px; font-weight: 500; letter-spacing: -0.03em; line-height: 1; margin-bottom: 6px; }
    .capital-growth { font-size: 12px; opacity: 0.8; }
    .capital-growth.positive { color: #7FD4A8; }
    .capital-stat { }
    .capital-stat-label { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .capital-stat-value { font-family: var(--mono); font-size: 18px; font-weight: 500; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 16px; }
    .stat-card-label { font-size: 11px; color: var(--text-3); margin-bottom: 6px; }
    .stat-card-value { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--text); line-height: 1; }
    .stat-card-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }

    /* Achievements */
    .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .achievement { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 16px; display: flex; align-items: flex-start; gap: 12px; }
    .achievement.locked { opacity: 0.45; filter: grayscale(0.5); }
    .achievement-icon { font-size: 24px; flex-shrink: 0; }
    .achievement-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 3px; }
    .achievement-desc { font-size: 12px; color: var(--text-3); line-height: 1.4; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 14px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Envelopes */
    .envelope-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 8px; }
    .envelope-icon { width: 36px; height: 36px; border-radius: 9px; background: var(--accent-green-light); border: 1px solid var(--accent-green-border); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .envelope-name { flex: 1; font-size: 14px; font-weight: 500; }
    .envelope-amount { font-family: var(--mono); font-size: 15px; font-weight: 500; }
    .envelope-sub { font-size: 11px; color: var(--text-3); }
    .envelope-progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .envelope-progress-fill { height: 100%; background: var(--accent-green); border-radius: 2px; }
  </style>
</head>
<body>

<div class="app-layout" id="appLayout">
  <main class="main-content">
    <div id="profileContent">
      <div style="text-align:center;padding:48px;color:var(--text-3)">
        <div class="spinner" style="margin:0 auto 12px"></div>
        Загружаем профиль…
      </div>
    </div>
  </main>
</div>

<script src="assets/js/theme.js"></script>
<script src="assets/js/sidebar-component.js"></script>
<script>
  initSidebarPage('profile');
  Theme.init();

  // Load user (inline mock — no fetch needed for file:// protocol)
  const user = mockUser();
  const savedName = localStorage.getItem('smartspend_username');
  if (savedName) user.name = savedName;
  user.initials = user.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  renderProfile(user);

  function mockUser() {
    return { id: 'u1', name: 'Никита Орлов', email: 'nikita@example.com', initials: 'НО', joinDate: '2024-03-15', plan: 'Pro', capital: 186400, capitalGrowth: 4.2, passiveIncome: 4400, emoSpend: 8200, smartBase: 22000, investCore: 40000, stats: { inventoryCount: 24, setsCreated: 3, articlesPublished: 1, totalSaved: 47200 }, achievements: [{ id: 'a1', title: 'Первый набор', description: 'Добавил первый набор', icon: '🎯', unlocked: true }, { id: 'a2', title: 'Месяц без лишних трат', description: '30 дней без импульсивных покупок', icon: '🏆', unlocked: true }, { id: 'a3', title: 'Автор', description: 'Опубликовал первую статью', icon: '✍️', unlocked: true }, { id: 'a4', title: 'Safety Point', description: 'Пассивный доход покрывает Smart-базу', icon: '🛡️', unlocked: false }] };
  }

  function renderProfile(u) {
    const joinDate = new Date(u.joinDate).toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });

    document.getElementById('profileContent').innerHTML = `
      <!-- Header -->
      <div class="profile-header">
        <div class="profile-avatar">${u.initials}</div>
        <div class="profile-info">
          <div class="profile-name">${u.name}</div>
          <div class="profile-meta">
            <span>${u.email}</span>
            <span class="profile-plan">✦ ${u.plan}</span>
            <span style="color:var(--text-3)">с ${joinDate}</span>
          </div>
          <div class="profile-actions">
            <a href="settings.html" class="btn btn-secondary" style="font-size:13px">Настройки</a>
            <a href="account.html" class="btn btn-ghost" style="font-size:13px">Аккаунт</a>
          </div>
        </div>
      </div>

      <!-- Capital -->
      <div class="capital-card">
        <div>
          <div class="capital-main-label">Капитал</div>
          <div class="capital-main-value">${u.capital.toLocaleString('ru')} ₽</div>
          <div class="capital-growth positive">↑ +${u.capitalGrowth}% за месяц</div>
        </div>
        <div class="capital-stat">
          <div class="capital-stat-label">Пассивный доход</div>
          <div class="capital-stat-value">${u.passiveIncome.toLocaleString('ru')} ₽/мес</div>
        </div>
        <div class="capital-stat">
          <div class="capital-stat-label">EmoSpend</div>
          <div class="capital-stat-value">${u.emoSpend.toLocaleString('ru')} ₽</div>
        </div>
      </div>

      <!-- Envelopes -->
      <div class="section-title">Конверты</div>
      <div style="margin-bottom:24px">
        <div class="envelope-row">
          <div class="envelope-icon">📋</div>
          <div style="flex:1">
            <div class="envelope-name">Smart-база</div>
            <div class="envelope-sub">Обязательные расходы</div>
            <div class="envelope-progress"><div class="envelope-progress-fill" style="width:100%"></div></div>
          </div>
          <div style="text-align:right">
            <div class="envelope-amount">${u.smartBase.toLocaleString('ru')} ₽</div>
            <div class="envelope-sub">из ${u.smartBase.toLocaleString('ru')} ₽</div>
          </div>
        </div>
        <div class="envelope-row">
          <div class="envelope-icon">📈</div>
          <div style="flex:1">
            <div class="envelope-name">Инвестиционное ядро</div>
            <div class="envelope-sub">Накопления</div>
            <div class="envelope-progress"><div class="envelope-progress-fill" style="width:72%"></div></div>
          </div>
          <div style="text-align:right">
            <div class="envelope-amount">${u.investCore.toLocaleString('ru')} ₽</div>
            <div class="envelope-sub">накоплено</div>
          </div>
        </div>
        <div class="envelope-row">
          <div class="envelope-icon">🎭</div>
          <div style="flex:1">
            <div class="envelope-name">EmoSpend</div>
            <div class="envelope-sub">Удовольствия</div>
            <div class="envelope-progress"><div class="envelope-progress-fill" style="width:58%"></div></div>
          </div>
          <div style="text-align:right">
            <div class="envelope-amount">${u.emoSpend.toLocaleString('ru')} ₽</div>
            <div class="envelope-sub">доступно</div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="section-title">Статистика</div>
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card">
          <div class="stat-card-label">В инвентаре</div>
          <div class="stat-card-value">${u.stats.inventoryCount}</div>
          <div class="stat-card-sub">позиций</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Создано наборов</div>
          <div class="stat-card-value">${u.stats.setsCreated}</div>
          <div class="stat-card-sub">наборов</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Статей написано</div>
          <div class="stat-card-value">${u.stats.articlesPublished}</div>
          <div class="stat-card-sub">публикац.</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Всего сэкономлено</div>
          <div class="stat-card-value" style="color:var(--accent-green)">${u.stats.totalSaved.toLocaleString('ru')}</div>
          <div class="stat-card-sub">рублей</div>
        </div>
      </div>

      <!-- Achievements -->
      <div class="section-title">Достижения</div>
      <div class="achievements-grid">
        ${u.achievements.map(a => `
          <div class="achievement${a.unlocked ? '' : ' locked'}">
            <div class="achievement-icon">${a.icon}</div>
            <div>
              <div class="achievement-title">${a.title}</div>
              <div class="achievement-desc">${a.description}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
</script>
</body>
</html>
