<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Написать статью — SmartSpend</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <style>
    .editor-container { max-width: 760px; }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }

    .title-input {
      width: 100%; padding: 14px 0; border: none; border-bottom: 2px solid var(--border);
      background: transparent; font-family: var(--sans); font-size: 26px; font-weight: 700;
      color: var(--text); outline: none; letter-spacing: -0.03em; line-height: 1.2;
      transition: border-color 0.2s;
    }
    .title-input:focus { border-bottom-color: var(--accent-green); }
    .title-input::placeholder { color: var(--text-3); }

    .form-input {
      width: 100%; padding: 10px 14px; border-radius: var(--r-sm); border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-family: var(--sans); font-size: 14px;
      outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent-green); }

    /* Toolbar */
    .editor-toolbar {
      display: flex; gap: 2px; padding: 8px 12px;
      background: var(--surface-2); border: 1px solid var(--border); border-bottom: none;
      border-radius: var(--r-sm) var(--r-sm) 0 0; flex-wrap: wrap;
    }
    .toolbar-btn {
      width: 32px; height: 32px; border-radius: 7px; border: none; background: none;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      color: var(--text-2); font-size: 13px; font-weight: 600; transition: all 0.15s;
    }
    .toolbar-btn:hover { background: var(--surface-3); color: var(--text); }
    .toolbar-btn.active { background: var(--accent-green-light); color: var(--accent-green); }
    .toolbar-sep { width: 1px; background: var(--border); margin: 4px 4px; }

    /* Editor */
    .editor-body {
      min-height: 360px; padding: 20px; border: 1px solid var(--border);
      border-radius: 0 0 var(--r-sm) var(--r-sm); background: var(--surface);
      font-size: 15px; line-height: 1.75; color: var(--text);
      outline: none;
    }
    .editor-body:empty::before { content: attr(data-placeholder); color: var(--text-3); pointer-events: none; }
    .editor-body p { margin-bottom: 14px; }
    .editor-body h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.025em; margin: 24px 0 10px; }
    .editor-body blockquote { border-left: 3px solid var(--accent-green); padding: 10px 16px; margin: 16px 0; background: var(--accent-green-light); border-radius: 0 var(--r-sm) var(--r-sm) 0; color: var(--text-2); font-style: italic; }
    .editor-body ul { padding-left: 20px; margin-bottom: 14px; }
    .editor-body ul li { margin-bottom: 6px; }
    .editor-word-count { font-size: 11px; color: var(--text-3); text-align: right; margin-top: 6px; }

    /* Meta section */
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Form actions */
    .form-actions { display: flex; gap: 10px; align-items: center; padding: 16px 0; position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--border); margin-top: 8px; }
    .draft-indicator { font-size: 12px; color: var(--text-3); margin-left: auto; }
  </style>
</head>
<body>

<div class="app-layout" id="appLayout">
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Новая статья</div>
        <div class="page-subtitle">Поделитесь знаниями с сообществом</div>
      </div>
      <a href="feed.html" class="btn btn-ghost">Отмена</a>
    </div>

    <div class="editor-container">

      <!-- Title -->
      <div class="form-group">
        <input class="title-input" id="articleTitle" type="text" placeholder="Заголовок статьи…" maxlength="120">
      </div>

      <!-- Meta -->
      <div class="meta-grid" style="margin-bottom:16px">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Категория</label>
          <select class="form-input" id="articleCategory">
            <option>Философия</option>
            <option>Инвентарь</option>
            <option>Финансы</option>
            <option>Потребление</option>
            <option>Психология</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Время чтения (мин)</label>
          <input class="form-input" id="readTime" type="number" min="1" max="60" value="5" placeholder="5">
        </div>
      </div>

      <!-- Excerpt -->
      <div class="form-group">
        <label class="form-label">Анонс (отображается в ленте)</label>
        <input class="form-input" id="articleExcerpt" type="text" placeholder="1-2 предложения, которые привлекут внимание…" maxlength="200">
      </div>

      <!-- Editor -->
      <div class="form-group">
        <label class="form-label">Текст статьи</label>
        <div class="editor-toolbar">
          <button class="toolbar-btn" onclick="execCmd('bold')" title="Жирный"><b>B</b></button>
          <button class="toolbar-btn" onclick="execCmd('italic')" title="Курсив"><i>I</i></button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" onclick="insertHeading()" title="Заголовок">H2</button>
          <button class="toolbar-btn" onclick="insertQuote()" title="Цитата">"</button>
          <button class="toolbar-btn" onclick="execCmd('insertUnorderedList')" title="Список">≡</button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" onclick="execCmd('removeFormat')" title="Убрать форматирование" style="font-size:11px">✕ формат</button>
        </div>
        <div class="editor-body" id="editor" contenteditable="true" data-placeholder="Начните писать или вставьте текст…"></div>
        <div class="editor-word-count" id="wordCount">0 слов</div>
      </div>

      <!-- Related sets -->
      <div class="form-group">
        <label class="form-label">Связанные наборы (опционально)</label>
        <select class="form-input" id="relatedSets" multiple style="height:80px;padding:6px">
          <option value="s1">Базовый уход за телом</option>
          <option value="s2">Спортивное питание: старт</option>
          <option value="s3">Кофейная база</option>
          <option value="s4">Домашняя аптечка</option>
          <option value="s5">Базовый гардероб (мужской)</option>
          <option value="s6">Рабочее место дома</option>
        </select>
        <div class="form-hint" style="font-size:11px;color:var(--text-3);margin-top:4px">Зажмите Ctrl/⌘ для выбора нескольких</div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn btn-primary" id="publishBtn" onclick="publishArticle()" disabled>Опубликовать</button>
        <button class="btn btn-secondary" onclick="saveDraft()">Сохранить черновик</button>
        <span class="draft-indicator" id="draftStatus">Не сохранено</span>
      </div>

    </div>
  </main>
</div>

<script src="assets/js/theme.js"></script>
<script src="assets/js/sidebar-component.js"></script>
<script>
  initSidebarPage('feed');
  Theme.init();

  const editor = document.getElementById('editor');
  const publishBtn = document.getElementById('publishBtn');

  // Word count + validate
  editor.addEventListener('input', () => {
    const text = editor.innerText.trim();
    const words = text ? text.split(/\s+/).length : 0;
    document.getElementById('wordCount').textContent = `${words} слов${words === 1 ? 'о' : words < 5 ? 'а' : ''}`;
    validate();
    autosave();
  });

  document.getElementById('articleTitle').addEventListener('input', () => { validate(); autosave(); });

  function validate() {
    const title = document.getElementById('articleTitle').value.trim();
    const body = editor.innerText.trim();
    publishBtn.disabled = !(title.length > 0 && body.length > 50);
  }

  let autosaveTimer;
  function autosave() {
    clearTimeout(autosaveTimer);
    document.getElementById('draftStatus').textContent = 'Сохранение…';
    autosaveTimer = setTimeout(() => {
      document.getElementById('draftStatus').textContent = `Сохранено ${new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })}`;
    }, 1200);
  }

  // Toolbar
  function execCmd(cmd) {
    document.execCommand(cmd, false, null);
    editor.focus();
  }

  function insertHeading() {
    document.execCommand('formatBlock', false, 'h2');
    editor.focus();
  }

  function insertQuote() {
    document.execCommand('formatBlock', false, 'blockquote');
    editor.focus();
  }

  function publishArticle() {
    showToast('Статья опубликована! ✓');
    setTimeout(() => location.href = 'feed.html', 1000);
  }

  function saveDraft() {
    document.getElementById('draftStatus').textContent = `Черновик сохранён ${new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })}`;
    showToast('Черновик сохранён');
  }

  function showToast(msg) {
    let t = document.querySelector('.toast');
    if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
